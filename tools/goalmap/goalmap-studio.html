<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ゴールマップ・スタジオ — 週次MTG用</title>
<!--
  週次MTGで使う、開くだけのインタラクティブ図解エディタ。
  左で編集（チェック／ステージ／ゴール）→ 右の図解と達成率が即更新。
  保存はブラウザ(localStorage)＋JSON書き出し。図解はPNG/印刷で出力。
  図解仕様は ../../ゴールマップ運用.md / tools/goalmap/generate_goalmap.py と同一。
-->
<style>
  :root{
    --done:#1D9E75; --done-bg:#E7F5EF;
    --now:#EF9F27;  --now-bg:#FDF3E2;
    --future:#9AA3AD; --future-bg:#F2F4F6;
    --goal:#6357CC; --goal-bg:#EEECFA;
    --ink:#1F2933; --sub:#67707A; --line:#E3E7EB;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Sans","Noto Sans CJK JP","Yu Gothic",sans-serif;
    color:var(--ink);background:#F7F8FA}
  header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;flex-wrap:wrap}
  header h1{font-size:15px;margin:0 12px 0 0}
  select,button,input{font-family:inherit;font-size:13px}
  button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer}
  button:hover{background:#F2F4F6}
  button.primary{background:var(--goal);color:#fff;border-color:var(--goal)}
  .wrap{display:grid;grid-template-columns:420px 1fr;gap:0;align-items:start}
  .editor{padding:16px;border-right:1px solid var(--line);height:calc(100vh - 52px);overflow:auto}
  .canvas{padding:20px;height:calc(100vh - 52px);overflow:auto;background:#fff}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--sub);margin-bottom:3px}
  .field input[type=text]{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px}
  .stage-pick{display:flex;gap:4px;flex-wrap:wrap}
  .stage-pick button{padding:5px 8px}
  .stage-pick button.on{background:var(--now);color:#fff;border-color:var(--now)}
  .phase{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px;background:#fff}
  .phase.now{border-color:var(--now);box-shadow:0 0 0 1px var(--now)}
  .phase-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .phase-head .badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
  .task{display:flex;align-items:center;gap:6px;margin:4px 0}
  .task input[type=text]{flex:1;padding:4px 6px;border:1px solid var(--line);border-radius:6px}
  .task input[type=checkbox]{width:16px;height:16px;accent-color:var(--done)}
  .task .del{border:none;background:none;color:var(--sub);cursor:pointer;font-size:15px;padding:2px 4px}
  .addtask{font-size:12px;color:var(--goal);background:none;border:none;cursor:pointer;padding:2px}
  .doneDef{width:100%;padding:4px 6px;border:1px dashed var(--line);border-radius:6px;font-size:12px;margin-top:4px}
  .duein{font-size:11px;border:1px solid var(--line);border-radius:6px;padding:1px 4px;color:var(--ink)}
  .duein.late{border-color:#DC2626;color:#DC2626;background:#FEE2E2}
  .phase.late{border-color:#DC2626;box-shadow:0 0 0 1px #DC2626}
  .lateflag{font-size:11px;font-weight:700;color:#DC2626;margin:2px 0 4px}
  .dueplus{font-size:10px;padding:2px 6px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;white-space:nowrap}
  .dueplus:hover{background:#F2F4F6}
  .cycle-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .nextgoal{font-size:12px;font-weight:700;padding:5px 10px;border:1px solid #E0B43A;border-radius:8px;background:linear-gradient(#FFF6D8,#F2C230);color:#7A3E00;cursor:pointer;white-space:nowrap}
  .nextgoal:hover{filter:brightness(1.04)}
  .hint{font-size:11px;color:var(--sub);margin:2px 0 12px}
  svg{max-width:100%;height:auto;border:1px solid var(--line);border-radius:8px}
  .roster{display:flex;gap:8px;overflow-x:auto;padding:8px 14px;background:#fff;border-bottom:1px solid var(--line)}
  .rtile{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:1px;border:1px solid var(--line);border-radius:10px;padding:4px 8px 5px;background:#fff;cursor:pointer;min-width:62px}
  .rtile:hover{background:#F7F8FA}
  .rtile.on{border-color:var(--goal);box-shadow:0 0 0 1px var(--goal);background:#FAF9FF}
  .rtile svg{width:44px;height:44px;display:block}
  .rtile .rname{font-size:11px;font-weight:700;color:var(--ink)}
  .rtile .rrate{font-size:10px;color:var(--sub)}
  body.summary .roster{display:none}
  body.summary .canvas{padding:8px;background:#fff}
  .ro-banner{display:flex;align-items:center;gap:12px;padding:8px 14px;background:#FFF3D6;border-bottom:1px solid #E0B43A;color:#7A3E00;font-size:13px;font-weight:700}
  .ro-banner button{margin-left:auto;font-size:12px;font-weight:700;padding:4px 10px;border:1px solid #C8901A;border-radius:8px;background:#fff;color:#7A3E00;cursor:pointer}
  .ro-note{background:#FFFDF7;border:1px dashed #E0B43A;border-radius:10px;padding:14px;color:#7A3E00;font-size:13px;line-height:1.7}
  .ro-note b{font-size:14px}
  .ro-note .sub{color:#9A7B3A;font-size:12px}
  .ro-note button{display:block;margin-top:12px;font-size:13px;font-weight:700;padding:7px 12px;border:1px solid #C8901A;border-radius:8px;background:#fff;color:#7A3E00;cursor:pointer}
  /* スマホ・タブレット縦：2カラムをやめて1カラムに積む。地図(canvas)を上に。 */
  @media (max-width:760px){
    header{gap:6px;padding:8px 10px}
    header h1{font-size:14px;margin:0;flex:1 1 100%}
    select,button{font-size:14px;padding:7px 11px}
    .wrap{grid-template-columns:1fr}
    .canvas{order:1;height:auto;padding:10px}
    .editor{order:2;height:auto;border-right:none;border-top:1px solid var(--line);padding:12px}
    /* iOSの入力フォーカス時の自動ズーム防止のため16px以上に */
    .field input[type=text],.task input[type=text],.doneDef,input[type=date]{font-size:16px}
    .task input[type=checkbox]{width:22px;height:22px}
    .rtile svg{width:52px;height:52px}
  }
  @media print{header,.editor,.roster,.ro-banner{display:none}.wrap{grid-template-columns:1fr}.canvas{height:auto;border:none}svg{border:none}}
</style>
</head>

<header>
  <h1>🧭 ゴールマップ・スタジオ</h1>
  <label class="hint">メンバー:</label>
  <select id="member"></select>
  <button id="new">＋新規</button>
  <button id="reset" title="このメンバーを内蔵の初期値に戻す">↺ 初期化</button>
  <label class="hint" style="margin-left:8px">読込:</label>
  <input type="file" id="import" accept="application/json" style="font-size:12px;width:170px" />
  <button id="exportJson">JSON保存</button>
  <button id="exportPng" class="primary">PNG出力</button>
  <button id="exportAvatar" title="今のアバターだけを画像で書き出す">アバターPNG</button>
  <button id="summary" title="スマホ1画面に全部まとめた表示（週次スクショ共有用）。もう一度押すと通常の地図に戻る">📱 1枚表示</button>
  <button id="print">印刷/PDF</button>
  <button id="history" title="過去の達成地図(out/archive/のJSON)を上書きせず読み取り専用で開く">🔒 履歴を見る</button>
  <input type="file" id="historyFile" accept="application/json" style="display:none" />
  <span id="saved" class="hint" style="margin-left:auto"></span>
</header>
<div class="roster" id="roster" title="クリックでメンバー切替（今のアバターが見えます）"></div>
<div id="roBanner" class="ro-banner" style="display:none"></div>
<div class="wrap">
  <div class="editor" id="editor"></div>
  <div class="canvas" id="canvas"></div>
</div>

  return (d.getMonth()+1)+"月第"+Math.ceil(d.getDate()/7)+"週";
}

function growth(d){
  const per=(d.phases||[]).map(p=>{const t=p.tasks||[];return{done:t.filter(x=>x.done).length,total:t.length};});
  const all=per.reduce((s,p)=>s+p.total,0), allDone=per.reduce((s,p)=>s+p.done,0);
  const rate=all?Math.round(allDone/all*100):0;
  let cleared=0; for(const p of per){ if(p.total>0&&p.done===p.total)cleared++; else break; }
  const form=rate>=100?5:Math.min(cleared,4);
  let np=null; for(const p of per){ if(!(p.total>0&&p.done===p.total)){np=p;break;} }
  if(!np)np=per[per.length-1]||{done:0,total:0};
  const cycle=Math.max(1,Math.floor(+d.cycle||1));
  // earned＝これまでに孵した不死鳥の数（過去の周回＋今回100%なら今回も）
  const earned=(cycle-1)+(rate>=100?1:0);
  return {rate,form,allDone,all,need:Math.max(0,np.total-np.done),phaseDone:np.done,phaseTotal:np.total,cycle,earned};
}

  return `<polygon points="${pts}" fill="${fill}"/>`;
}

    o.push(`<text x="${tx}" y="${ccy-3}" font-size="13" font-weight="700" fill="${COL.ink}">あと${g.need}コで進化</text>`);
    o.push(`<text x="${tx}" y="${ccy+15}" font-size="11" fill="${COL.sub}">餌 ${g.phaseDone}/${g.phaseTotal}　累計 ${g.allDone}/${g.all}</text>`);
  }else{
    o.push(`<text x="${tx}" y="${ccy+2}" font-size="13" font-weight="700" fill="#C2410C">覚醒！全タスク完了</text>`);
  }
  // 周回（何羽目の不死鳥まで来たか）— 2周目以降 or 不死鳥で表示
  if(g.cycle>=2 || g.earned>0){
    o.push(`<text x="${tx}" y="${ccy+33}" font-size="11" font-weight="700" fill="#B7791F">${g.cycle}周目${g.earned>0?`・達成 ${g.earned}羽`:""}</text>`);
  }
  o.push(`<text x="${PILL_X}" y="62" font-size="10" fill="${COL.sub}">目標時期</text>`);
  const todayIso=todayISO(); let overdueAny=false;
  let y=gy+GOAL_H+GAP; arrow(y,gy+GOAL_H);
  order.forEach(idx=>{
    const p=phases[idx], h=hts[idx], sn=idx+1, tasks=p.tasks||[];
    let st,fg,bg;
    if(sn<cur){st="done";fg=COL.done;bg=COL.doneBg;}
    else if(sn===cur){st="now";fg=COL.now;bg=COL.nowBg;}
    else{st="future";fg=COL.future;bg=COL.futureBg;}
    // 目標時期ピル（終了日から固定。未完了かつ期限超過＝遅れは赤）
    const complete=tasks.length>0 && tasks.every(t=>t.done);
    const due=p.due; let pl,pf,pb;
    if(sn<cur||complete){pl="クリア";pf=COL.done;pb=COL.doneBg;}
    else if(due && due<todayIso){pl="⚠"+weekLabelDate(due);pf="#DC2626";pb="#FEE2E2";overdueAny=true;}
    else{pl=due?weekLabelDate(due):"—";pf=(st==="now")?COL.now:COL.future;pb=(st==="now")?COL.nowBg:COL.futureBg;}
    const sw=st==="now"?2:1;
    o.push(`<rect x="${PHASE_X}" y="${y}" width="${PHASE_W}" height="${h}" rx="10" fill="${bg}" stroke="${fg}" stroke-width="${sw}"/>`);
    const mcy=y+20;
    o.push(`<circle cx="${PHASE_X-12}" cy="${mcy}" r="9" fill="${fg}"/>`);
    if(st==="done")o.push(`<path d="M${PHASE_X-16},${mcy} l3,3 l6,-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`);
    o.push(`<text x="${PHASE_X+12}" y="${y+22}" font-size="14" font-weight="700" fill="${COL.ink}">${esc(STAGE_NAMES[idx])}</text>`);
    wrap("完了："+(p.doneDef||""),15).slice(0,2).forEach((l,k)=>o.push(`<text x="${PHASE_X+12}" y="${y+40+k*15}" font-size="11" fill="${COL.sub}">${esc(l)}</text>`));
    pill(y+h/2,pl,pf,pb);
    tasks.forEach((t,j)=>{const ty=y+16+j*LH, dn=!!t.done, bc=dn?COL.done:COL.future;
      o.push(`<rect x="${TASK_X}" y="${ty-11}" width="14" height="14" rx="3" fill="${dn?COL.done:"#fff"}" stroke="${bc}" stroke-width="1.5"/>`);
      if(dn)o.push(`<path d="M${TASK_X+3},${ty-4} l3,3 l5,-6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`);
      o.push(`<text x="${TASK_X+22}" y="${ty}" font-size="12.5" fill="${dn?COL.sub:COL.ink}"${dn?' text-decoration="line-through"':''}>${esc(t.name)}</text>`);});
    const yn=y+h+GAP; if(idx!==0)arrow(yn,y+h); y=yn;
  });
  if(overdueAny){
    // タイトル(y34)・達成率バー(右)と重ならないようヘッダー下段中央(y44〜66)に配置
    o.push(`<rect x="196" y="44" width="176" height="22" rx="11" fill="#DC2626"/>`);
    o.push(`<text x="284" y="59" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">⚠ 期限に遅れあり</text>`);
  }
  o.push("</svg>");
  return o.join("\n");
}

// 今週の最優先タスク：現在ステージ以降で最初の未完タスク
function topTask(d){
  const cur=+d.currentStage||1;
  for(let s=cur-1;s<(d.phases||[]).length;s++){
    const t=(d.phases[s].tasks||[]).find(x=>!x.done); if(t)return{task:t.name,stage:s};
  }
  for(let s=0;s<(d.phases||[]).length;s++){
    const t=(d.phases[s].tasks||[]).find(x=>!x.done); if(t)return{task:t.name,stage:s};
  }
  return {task:"全タスク完了！次のゴールへ",stage:cur-1};
}

// スマホ1画面まとめ表示（週次スクショ共有用）：ゴール・アバター・現在地・最優先・全タスクを1枚に凝縮
function buildSummarySvg(d){
  const W=430, PAD=12, taskH=16;     // LINE可読性のため横幅を広げ文字を一回り大きく
  const g=growth(d), cur=+d.currentStage||1, tt=topTask(d), todayIso=todayISO();
  const blocks=(d.phases||[]).map((p,idx)=>{const tasks=p.tasks||[];return{idx,p,tasks,h:22+Math.max(1,tasks.length)*taskH+6};});
  const gy=48, gw=270, gh=64;
  const py=gy+gh+12, stripH=46;      // 最優先ストリップ
  const headH=py+stripH+10;
  const H=headH+blocks.reduce((s,b)=>s+b.h+6,0)+PAD;
  const o=[];
  o.push(`<svg xmlns="http://www.w3.org/2000/svg" id="gm" viewBox="0 0 ${W} ${H}" font-family="${FONT}" width="${W}" height="${H}">`);
  o.push(SVG_DEFS);
  o.push(`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>`);
  // 名前・テーマ／達成率・バー

  o.push(`<text x="${PAD}" y="40" font-size="11.5" fill="${COL.sub}">${esc(d.theme||"")}</text>`);
  o.push(`<text x="${W-PAD}" y="22" text-anchor="end" font-size="17" font-weight="700" fill="${COL.done}">達成率 ${g.rate}%</text>`);
  o.push(`<rect x="${W-150}" y="30" width="138" height="8" rx="4" fill="${COL.futureBg}"/>`);
  o.push(`<rect x="${W-150}" y="30" width="${Math.round(138*g.rate/100)}" height="8" rx="4" fill="${COL.done}"/>`);
  // ゴール箱
  o.push(`<rect x="${PAD}" y="${gy}" width="${gw}" height="${gh}" rx="10" fill="url(#goalGrad)" stroke="#FFD36E" stroke-width="2"/>`);
  o.push(`<rect x="${PAD}" y="${gy}" width="${gw}" height="${gh/2}" rx="10" fill="#fff" opacity="0.16"/>`);
  o.push(`<text x="${PAD+12}" y="${gy+20}" font-size="12" font-weight="700" fill="#fff">ゴール</text>`);
  o.push(star(PAD+gw-15, gy+14, 6, "#FFF1B8"));
  wrap(d.goal,18).slice(0,2).forEach((l,k)=>o.push(`<text x="${PAD+12}" y="${gy+40+k*17}" font-size="14" font-weight="600" fill="#fff">${esc(l)}</text>`));
  // アバター（小）＋キャプション
  const acx=Math.round((PAD+gw+(W-PAD))/2), acy=gy+32;
  o.push(birdMarkup(g.form,acx,acy,1.3,g.phaseDone,g.cycle>=2?g.cycle:0));
  o.push(`<text x="${acx}" y="${gy+gh+2}" text-anchor="middle" font-size="11" font-weight="700" fill="#B7791F">${g.form<5?`あと${g.need}コ`:"覚醒"}${g.cycle>=2?`・${g.cycle}周目`:""}</text>`);
  // 今週の最優先ストリップ
  o.push(`<rect x="${PAD}" y="${py}" width="${W-2*PAD}" height="${stripH}" rx="10" fill="${COL.nowBg}" stroke="${COL.now}"/>`);
  o.push(`<text x="${PAD+12}" y="${py+17}" font-size="12" font-weight="700" fill="${COL.now}">🎯 今週の最優先（今ここ：${esc(STAGE_NAMES[tt.stage])}）</text>`);
  o.push(`<text x="${PAD+12}" y="${py+37}" font-size="15" font-weight="700" fill="${COL.ink}">${esc(wrap(tt.task,30)[0])}</text>`);
  // ステージ（①→⑤・全タスク）
  let y=headH;
  blocks.forEach(b=>{
    const sn=b.idx+1, isNow=sn===cur;
    let st,fg;
    if(sn<cur){st="done";fg=COL.done;} else if(isNow){st="now";fg=COL.now;} else{st="future";fg=COL.future;}
    if(isNow)o.push(`<rect x="6" y="${y-2}" width="${W-12}" height="${b.h}" rx="9" fill="${COL.nowBg}" opacity="0.5"/>`);
    o.push(`<circle cx="${PAD+6}" cy="${y+11}" r="5.5" fill="${fg}"/>`);
    o.push(`<text x="${PAD+18}" y="${y+15}" font-size="13" font-weight="700" fill="${COL.ink}">${esc(STAGE_NAMES[b.idx])}</text>`);
    const complete=b.tasks.length>0&&b.tasks.every(t=>t.done);
    const due=b.p.due; let pl,pf,pb;
    if(sn<cur||complete){pl="クリア";pf=COL.done;pb=COL.doneBg;}
    else if(due&&due<todayIso){pl="⚠"+weekLabelDate(due);pf="#DC2626";pb="#FEE2E2";}
    else{pl=due?weekLabelDate(due):"—";pf=(st==="now")?COL.now:COL.future;pb=(st==="now")?COL.nowBg:COL.futureBg;}
    o.push(`<rect x="${W-100}" y="${y+2}" width="88" height="19" rx="9.5" fill="${pb}" stroke="${pf}"/>`);
    o.push(`<text x="${W-56}" y="${y+15}" text-anchor="middle" font-size="11" font-weight="700" fill="${pf}">${esc(pl)}</text>`);
    let ty=y+34;
    (b.tasks.length?b.tasks:[{name:"（タスクなし）",done:false}]).forEach(t=>{
      const dn=!!t.done;
      o.push(`<rect x="${PAD+18}" y="${ty-10}" width="13" height="13" rx="3" fill="${dn?COL.done:"#fff"}" stroke="${dn?COL.done:COL.future}" stroke-width="1.4"/>`);
      if(dn)o.push(`<path d="M${PAD+21},${ty-3.5} l2.4,2.4 l4.6,-6" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`);
      o.push(`<text x="${PAD+36}" y="${ty}" font-size="12" fill="${dn?COL.sub:COL.ink}"${dn?' text-decoration="line-through"':""}>${esc(wrap(t.name,30)[0])}</text>`);
      ty+=taskH;
    });
    y+=b.h+6;
  });
  o.push("</svg>");
  return o.join("\n");
}

// ───────── 書き出しヘルパー（アーカイブ／各種PNG共通）─────────
function downloadJSON(obj,filename){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
function downloadSvgPng(xml,w,h,scale,filename){
  const img=new Image();
  img.onload=()=>{const c=document.createElement("canvas");c.width=w*scale;c.height=h*scale;
    const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);
    ctx.scale(scale,scale);ctx.drawImage(img,0,0);
    const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=filename;a.click();};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);
}
// この周回の最終地図(PNG)とデータ(JSON)をアーカイブとして書き出す
function archiveCycle(d){
  const cyc=Math.max(1,Math.floor(+d.cycle||1));
  const base=`${d.name}_cycle${cyc}`;
  downloadJSON(d, base+".json");
  const xml=buildSvg(d), m=xml.match(/width="(\d+)" height="(\d+)"/);
  downloadSvgPng(xml, +m[1], +m[2], 2, base+".png");
  return base;
}

// ───────── イベント ─────────
document.getElementById("editor").addEventListener("input",ev=>{
  const t=ev.target;
  if(t.dataset.f){data[t.dataset.f]=t.value;}
  else if(t.dataset.fCycle!=null){data.cycle=Math.max(1,Math.floor(+t.value||1));}
  else if(t.dataset.phasename!=null){data.phases[+t.dataset.phasename].name=t.value;}
  else if(t.dataset.donedef!=null){data.phases[+t.dataset.donedef].doneDef=t.value;}
  else if(t.dataset.taskname){const[i,j]=t.dataset.taskname.split(":").map(Number);data.phases[i].tasks[j].name=t.value;}
  else if(t.dataset.task){const[i,j]=t.dataset.task.split(":").map(Number);data.phases[i].tasks[j].done=t.checked;}
  else if(t.dataset.due!=null){data.phases[+t.dataset.due].due=t.value;}
  else return;
  persist();
  if(t.dataset.task||t.dataset.due!=null)renderEditor(); // チェック/期限変更で表示を反映
});
document.getElementById("editor").addEventListener("click",ev=>{
  const t=ev.target;
  if(t.dataset.stage){data.currentStage=+t.dataset.stage;persist();renderEditor();}
  else if(t.dataset.addtask!=null){data.phases[+t.dataset.addtask].tasks.push({name:"新しいタスク",done:false});persist();renderEditor();}
  else if(t.dataset.deltask){const[i,j]=t.dataset.deltask.split(":").map(Number);data.phases[i].tasks.splice(j,1);persist();renderEditor();}
  else if(t.dataset.dueplus!=null){const i=+t.dataset.dueplus;
    for(let j=i;j<data.phases.length;j++){const p=data.phases[j];const d=p.due?new Date(p.due+"T00:00:00"):new Date();d.setDate(d.getDate()+7);p.due=isoOf(d);}
    persist();renderEditor();}
  else if(t.dataset.nextgoal!=null){
    if(confirm("現在のゴールを達成として、次のゴールに進みます。\n\nまず【この周回の地図(PNG)とデータ(JSON)を書き出し】てから:\n・周回数を+1（アバターに番号が付き、何羽目か分かる）\n・全タスクのチェックを外す（卵に戻る）\n・ステージを①に戻す\n\n書き出した2ファイルは tools/goalmap/out/archive/ に保存してコミットすると、過去の達成地図をいつでも見返せます。\nゴール文・テーマ・タスクは、このあと新しいゴールに手動で書き換えてください。")){
      const base=archiveCycle(data); // ★リセット前にこの周回をアーカイブ書き出し
      data.cycle=Math.max(1,Math.floor(+data.cycle||1))+1;
      data.currentStage=1;
      (data.phases||[]).forEach(p=>(p.tasks||[]).forEach(x=>{x.done=false;if("status" in x)x.status="未着手";}));
      persist();renderEditor();
      flash(`${base} を書き出しました → out/archive/ に保存 ✓`);
    }
  }
});

document.getElementById("historyFile").addEventListener("change",ev=>{
  const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{enterHistory(JSON.parse(r.result),f.name);}catch(e){alert("JSONの読み込みに失敗: "+e);}};
  r.readAsText(f); ev.target.value="";});   // 同じファイルを再選択できるようにリセット
document.addEventListener("click",ev=>{ if(ev.target.id==="historyClose"||ev.target.id==="historyClose2")exitHistory(); });
document.getElementById("reset").addEventListener("click",()=>{
  if(viewing){exitHistory();return;}   // 履歴表示中は初期化せず、現在地に戻すだけ
  const base=findEmbedded(data.name);
  if(!base){alert("このメンバーは内蔵の初期値がありません（手元のJSONから読み込んでください）");return;}
  if(!confirm(`「${data.name}」を内蔵の初期値に戻します。今の編集内容は消えます。よろしいですか？`))return;
  data=base;save(data);renderAll();});
document.getElementById("new").addEventListener("click",()=>{leaveViewing();const n=prompt("メンバー名は？");if(!n)return;data=template(n);save(data);renderAll();});
document.getElementById("import").addEventListener("change",ev=>{
  const f=ev.target.files[0];if(!f)return;leaveViewing();const r=new FileReader();
  r.onload=()=>{try{data=JSON.parse(r.result);save(data);renderAll();}catch(e){alert("JSONの読み込みに失敗: "+e);}};r.readAsText(f);});
document.getElementById("exportJson").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=data.name+".json";a.click();});
document.getElementById("print").addEventListener("click",()=>window.print());
document.getElementById("summary").addEventListener("click",()=>{
  summaryMode=!summaryMode;
  document.getElementById("summary").classList.toggle("primary",summaryMode);
  document.body.classList.toggle("summary",summaryMode);   // ロスターを隠してスッキリ
  renderCanvas();
  if(summaryMode)document.getElementById("canvas").scrollIntoView({behavior:"smooth",block:"start"});
});
document.getElementById("exportAvatar").addEventListener("click",()=>{
  const xml=buildAvatarCard(data);
  const m=xml.match(/width="(\d+)" height="(\d+)"/);
  const img=new Image();
  img.onload=()=>{const s=3,c=document.createElement("canvas");
    c.width=(+m[1])*s;c.height=(+m[2])*s;const ctx=c.getContext("2d");
    ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);ctx.scale(s,s);ctx.drawImage(img,0,0);
    const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=data.name+"_アバター.png";a.click();};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);});
document.getElementById("exportPng").addEventListener("click",()=>{
  const svg=document.getElementById("gm");
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  img.onload=()=>{const s=3,c=document.createElement("canvas");   // 高解像度（LINE圧縮対策）
    c.width=svg.viewBox.baseVal.width*s;c.height=svg.viewBox.baseVal.height*s;
    const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);
    ctx.scale(s,s);ctx.drawImage(img,0,0);
    const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=data.name+".png";a.click();};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);});

// ───────── 起動 ─────────
(function init(){
  // 内蔵メンバーで、まだlocalStorageに無いものを初期投入（既存の編集は上書きしない）
  EMBEDDED.forEach(m=>{ if(!load(m.name)) localStorage.setItem(KEY(m.name),JSON.stringify(m)); });
  const members=listMembers();
  data=load(members[0])||clone(EMBEDDED[0]);
  renderAll();
})();
</script>
