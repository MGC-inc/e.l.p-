<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ゴールマップ・スタジオ — 週次MTG用</title>
<!--
  週次MTGで使う、開くだけのインタラクティブ図解エディタ。
  左で編集（チェック／ステージ／ゴール）→ 右の図解と達成率が即更新。
  保存はブラウザ(localStorage)＋JSON書き出し。図解はPNG/印刷で出力。
  図解仕様は ../../ゴールマップ運用.md / tools/goalmap/generate_goalmap.py と同一。
-->
<style>
  :root{
    --done:#1D9E75; --done-bg:#E7F5EF;
    --now:#EF9F27;  --now-bg:#FDF3E2;
    --future:#9AA3AD; --future-bg:#F2F4F6;
    --goal:#6357CC; --goal-bg:#EEECFA;
    --ink:#1F2933; --sub:#67707A; --line:#E3E7EB;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Sans","Noto Sans CJK JP","Yu Gothic",sans-serif;
    color:var(--ink);background:#F7F8FA}
  header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;flex-wrap:wrap}
  header h1{font-size:15px;margin:0 12px 0 0}
  select,button,input{font-family:inherit;font-size:13px}
  button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer}
  button:hover{background:#F2F4F6}
  button.primary{background:var(--goal);color:#fff;border-color:var(--goal)}
  .wrap{display:grid;grid-template-columns:420px 1fr;gap:0;align-items:start}
  .editor{padding:16px;border-right:1px solid var(--line);height:calc(100vh - 52px);overflow:auto}
  .canvas{padding:20px;height:calc(100vh - 52px);overflow:auto;background:#fff}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--sub);margin-bottom:3px}
  .field input[type=text]{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px}
  .stage-pick{display:flex;gap:4px;flex-wrap:wrap}
  .stage-pick button{padding:5px 8px}
  .stage-pick button.on{background:var(--now);color:#fff;border-color:var(--now)}
  .phase{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px;background:#fff}
  .phase.now{border-color:var(--now);box-shadow:0 0 0 1px var(--now)}
  .phase-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .phase-head .badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
  .task{display:flex;align-items:center;gap:6px;margin:4px 0}
  .task input[type=text]{flex:1;padding:4px 6px;border:1px solid var(--line);border-radius:6px}
  .task input[type=checkbox]{width:16px;height:16px;accent-color:var(--done)}
  .task .del{border:none;background:none;color:var(--sub);cursor:pointer;font-size:15px;padding:2px 4px}
  .addtask{font-size:12px;color:var(--goal);background:none;border:none;cursor:pointer;padding:2px}
  .doneDef{width:100%;padding:4px 6px;border:1px dashed var(--line);border-radius:6px;font-size:12px;margin-top:4px}
  .duein{font-size:11px;border:1px solid var(--line);border-radius:6px;padding:1px 4px;color:var(--ink)}
  .duein.late{border-color:#DC2626;color:#DC2626;background:#FEE2E2}
  .phase.late{border-color:#DC2626;box-shadow:0 0 0 1px #DC2626}
  .lateflag{font-size:11px;font-weight:700;color:#DC2626;margin:2px 0 4px}
  .dueplus{font-size:10px;padding:2px 6px;border:1px solid var(--line);border-radius:6px;background:#fff;cursor:pointer;white-space:nowrap}
  .dueplus:hover{background:#F2F4F6}
  .cycle-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .nextgoal{font-size:12px;font-weight:700;padding:5px 10px;border:1px solid #E0B43A;border-radius:8px;background:linear-gradient(#FFF6D8,#F2C230);color:#7A3E00;cursor:pointer;white-space:nowrap}
  .nextgoal:hover{filter:brightness(1.04)}
  .hint{font-size:11px;color:var(--sub);margin:2px 0 12px}
  svg{max-width:100%;height:auto;border:1px solid var(--line);border-radius:8px}
  .roster{display:flex;gap:8px;overflow-x:auto;padding:8px 14px;background:#fff;border-bottom:1px solid var(--line)}
  .rtile{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:1px;border:1px solid var(--line);border-radius:10px;padding:4px 8px 5px;background:#fff;cursor:pointer;min-width:62px}
  .rtile:hover{background:#F7F8FA}
  .rtile.on{border-color:var(--goal);box-shadow:0 0 0 1px var(--goal);background:#FAF9FF}
  .rtile svg{width:44px;height:44px;display:block}
  .rtile .rname{font-size:11px;font-weight:700;color:var(--ink)}
  .rtile .rrate{font-size:10px;color:var(--sub)}
  body.summary .roster{display:none}
  body.summary .canvas{padding:8px;background:#fff}
  .ro-banner{display:flex;align-items:center;gap:12px;padding:8px 14px;background:#FFF3D6;border-bottom:1px solid #E0B43A;color:#7A3E00;font-size:13px;font-weight:700}
  .ro-banner button{margin-left:auto;font-size:12px;font-weight:700;padding:4px 10px;border:1px solid #C8901A;border-radius:8px;background:#fff;color:#7A3E00;cursor:pointer}
  .ro-note{background:#FFFDF7;border:1px dashed #E0B43A;border-radius:10px;padding:14px;color:#7A3E00;font-size:13px;line-height:1.7}
  .ro-note b{font-size:14px}
  .ro-note .sub{color:#9A7B3A;font-size:12px}
  .ro-note button{display:block;margin-top:12px;font-size:13px;font-weight:700;padding:7px 12px;border:1px solid #C8901A;border-radius:8px;background:#fff;color:#7A3E00;cursor:pointer}
  /* 🎙 MTログ / 議事録パネル */
  .mtlog{margin:0;border-top:1px solid var(--line);background:#fff}
  .mtlog>details{padding:14px 18px}
  .mtlog>details>summary{font-size:14px;font-weight:700;cursor:pointer;list-style:none;color:var(--ink)}
  .mtlog>details>summary::-webkit-details-marker{display:none}
  .mtlog>details>summary::before{content:"▸ ";color:var(--sub)}
  .mtlog>details[open]>summary::before{content:"▾ "}
  .mtlog .mt-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px;align-items:start}
  .mtlog .mt-col h4{font-size:12px;color:var(--sub);margin:0 0 6px}
  .mtlog .rec-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .mtlog .recbtn{font-size:13px;font-weight:700;padding:7px 14px;border-radius:8px;border:1px solid #DC2626;background:#fff;color:#DC2626;cursor:pointer}
  .mtlog .recbtn.on{background:#DC2626;color:#fff}
  .mtlog .rec-note{font-size:11px;color:var(--sub)}
  .mtlog label{display:block;font-size:11px;color:var(--sub);margin:8px 0 3px}
  .mtlog input[type=date],.mtlog textarea{width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit}
  .mtlog textarea{resize:vertical}
  .mtlog .mt-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .mtlog .mt-actions button{font-size:12px}
  .mtlog .task-to{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px}
  .mtlog .logs{margin-top:4px;max-height:320px;overflow:auto}
  .mtlog .logitem{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px;background:#FBFCFD}
  .mtlog .logitem .lh{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--ink)}
  .mtlog .logitem .lh .dellog{margin-left:auto;border:none;background:none;color:var(--sub);cursor:pointer;font-size:14px}
  .mtlog .logitem .lh .logmd{border:1px solid var(--line);background:#fff;border-radius:6px;font-size:10px;padding:2px 6px;cursor:pointer}
  .mtlog .logitem .ltext{font-size:12px;color:var(--ink);white-space:pre-wrap;margin:6px 0}
  .mtlog .logitem .lnext{list-style:none;padding:0;margin:4px 0 0}
  .mtlog .logitem .lnext li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);margin:3px 0}
  .mtlog .logitem .lnext button{font-size:10px;color:var(--goal);border:1px solid var(--line);background:#fff;border-radius:6px;padding:1px 6px;cursor:pointer}
  .mtlog .empty{font-size:12px;color:var(--sub)}
  /* スマホ・タブレット縦：2カラムをやめて1カラムに積む。地図(canvas)を上に。 */
  @media (max-width:760px){
    header{gap:6px;padding:8px 10px}
    header h1{font-size:14px;margin:0;flex:1 1 100%}
    select,button{font-size:14px;padding:7px 11px}
    .wrap{grid-template-columns:1fr}
    .canvas{order:1;height:auto;padding:10px}
    .editor{order:2;height:auto;border-right:none;border-top:1px solid var(--line);padding:12px}
    /* iOSの入力フォーカス時の自動ズーム防止のため16px以上に */
    .field input[type=text],.task input[type=text],.doneDef,input[type=date]{font-size:16px}
    .task input[type=checkbox]{width:22px;height:22px}
    .rtile svg{width:52px;height:52px}
    .mtlog .mt-grid{grid-template-columns:1fr}
    .mtlog input[type=date],.mtlog textarea{font-size:16px}
  }
  body.summary #mtlog{display:none}
  @media print{header,.editor,.roster,.ro-banner,#mtlog{display:none}.wrap{grid-template-columns:1fr}.canvas{height:auto;border:none}svg{border:none}}
</style>
</head>
<body>
<header>
  <h1>🧭 ゴールマップ・スタジオ</h1>
  <label class="hint">メンバー:</label>
  <select id="member"></select>
  <button id="new">＋新規</button>
  <button id="reset" title="このメンバーを内蔵の初期値に戻す">↺ 初期化</button>
  <label class="hint" style="margin-left:8px">読込:</label>
  <input type="file" id="import" accept="application/json" style="font-size:12px;width:170px" />
  <button id="exportJson">JSON保存</button>
  <button id="exportPng" class="primary">PNG出力</button>
  <button id="exportAvatar" title="今のアバターだけを画像で書き出す">アバターPNG</button>
  <button id="summary" title="スマホ1画面に全部まとめた表示（週次スクショ共有用）。もう一度押すと通常の地図に戻る">📱 1枚表示</button>
  <button id="overview" title="タスクを畳んで、大枠▸中目標▸今期ゴールの全体像だけを俯瞰する。もう一度で通常表示">🔭 俯瞰</button>
  <button id="print">印刷/PDF</button>
  <button id="history" title="過去の達成地図(out/archive/のJSON)を上書きせず読み取り専用で開く">🔒 履歴を見る</button>
  <input type="file" id="historyFile" accept="application/json" style="display:none" />
  <span id="saved" class="hint" style="margin-left:auto"></span>
</header>
<div class="roster" id="roster" title="クリックでメンバー切替（今のアバターが見えます）"></div>
<div id="roBanner" class="ro-banner" style="display:none"></div>
<div class="wrap">
  <div class="editor" id="editor"></div>
  <div class="canvas" id="canvas"></div>
</div>
<section id="mtlog" class="mtlog"></section>

<script>
const STAGE_NAMES = ["①型を知る","②練習","③実践","④振り返り","⑤自走"];
function weekLabel(weeksAhead){
  const d=new Date(); d.setDate(d.getDate()+weeksAhead*7);
  return (d.getMonth()+1)+"月第"+Math.ceil(d.getDate()/7)+"週";
}
function weekLabelDate(s){const d=new Date(s+"T00:00:00");return (d.getMonth()+1)+"月第"+Math.ceil(d.getDate()/7)+"週";}
function isoOf(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayISO(){return isoOf(new Date());}
const COL = {done:"#1D9E75",doneBg:"#E7F5EF",now:"#EF9F27",nowBg:"#FDF3E2",
  future:"#9AA3AD",futureBg:"#F2F4F6",goal:"#6357CC",goalBg:"#EEECFA",ink:"#1F2933",sub:"#67707A"};
const FONT = "Hiragino Sans, 'Noto Sans CJK JP', 'Yu Gothic', sans-serif";
const SVG_DEFS = `<defs>`+
  `<linearGradient id="goalGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5B4BE0"/><stop offset="0.5" stop-color="#B14BE0"/><stop offset="1" stop-color="#FFC24B"/></linearGradient>`+
  `<linearGradient id="phx" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFE259"/><stop offset="0.5" stop-color="#FF9A00"/><stop offset="1" stop-color="#FF3D00"/></linearGradient>`+
  `<linearGradient id="phx2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF0A0"/><stop offset="1" stop-color="#FF7A00"/></linearGradient>`+
  `<linearGradient id="hen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#37C9B0"/><stop offset="0.6" stop-color="#3DA0E8"/><stop offset="1" stop-color="#7A5BE0"/></linearGradient>`+
  `<linearGradient id="pcock" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2BD0C0"/><stop offset="0.55" stop-color="#2E8FD0"/><stop offset="1" stop-color="#2E4BB0"/></linearGradient>`+

  `</defs>`;

function template(name){
  return {name:name||"新規メンバー",note:"",theme:"テーマ",goal:"観察できる状態でゴールを書く",
    vision:"",visionDue:"",midGoal:"",midDue:"",why:"",currentStage:1,cycle:1,logs:[],
    phases:[
      {name:"型を知る",doneDef:"観察できる完了の状態",tasks:[]},

      {name:"実践",doneDef:"観察できる完了の状態",tasks:[]},

}

function growth(d){
  const per=(d.phases||[]).map(p=>{const t=p.tasks||[];return{done:t.filter(x=>x.done).length,total:t.length};});
  const all=per.reduce((s,p)=>s+p.total,0), allDone=per.reduce((s,p)=>s+p.done,0);
  const rate=all?Math.round(allDone/all*100):0;
  let cleared=0; for(const p of per){ if(p.total>0&&p.done===p.total)cleared++; else break; }
  const form=rate>=100?5:Math.min(cleared,4);
  let np=null; for(const p of per){ if(!(p.total>0&&p.done===p.total)){np=p;break;} }
  if(!np)np=per[per.length-1]||{done:0,total:0};

  // earned＝これまでに孵した不死鳥の数（過去の周回＋今回100%なら今回も）
  const earned=(cycle-1)+(rate>=100?1:0);

  // 周回リボン（右上に「○周目」＝何羽目の不死鳥を目指しているか）
  if(g.cycle>=2 || g.earned>0){
    o.push(`<rect x="${W-92}" y="16" width="76" height="24" rx="12" fill="url(#gold)" stroke="#fff" stroke-width="1.5"/>`);
    o.push(`<text x="${W-54}" y="32" text-anchor="middle" font-size="12.5" font-weight="800" fill="#7A3E00">${g.cycle}周目</text>`);
  }
  // 文字の可読性確保の帯（背の高い不死鳥でも名前が読める）
  o.push(`<rect x="14" y="158" width="${W-28}" height="62" rx="12" fill="#FFFDF7" opacity="0.92"/>`);
  o.push(`<text x="${W/2}" y="182" text-anchor="middle" font-size="20" font-weight="700" fill="${ink}">${esc(d.name||"")}</text>`);
  o.push(`<text x="${W/2}" y="202" text-anchor="middle" font-size="15" font-weight="700" fill="${g.form===5?"#C2410C":"#B7791F"}">達成率 ${g.rate}%</text>`);
  let sub2 = g.form<5 ? `あと${g.need}コで進化（餌 ${g.phaseDone}/${g.phaseTotal}）` : `覚醒！全タスク完了`;
  if(g.earned>0) sub2 += `　通算${g.earned}羽`;
  o.push(`<text x="${W/2}" y="217" text-anchor="middle" font-size="11.5" fill="${sub}">${esc(sub2)}</text>`);
  o.push("</svg>");
  return o.join("\n");
}

function buildSvg(d){
  const W=680, PHASE_X=130, PHASE_W=210, PILL_X=16, PILL_W=80, TASK_X=360,
        HEADER_H=70, GAP=26, GOAL_H=70, PAD=28, LH=18;
  const phases=d.phases, cur=+d.currentStage||1;
  const all=phases.flatMap(p=>p.tasks||[]); const done=all.filter(t=>t.done).length;
  const total=all.length, rate=total?Math.round(done/total*100):0;
  const order=[4,3,2,1,0];
  const hts={}; order.forEach(i=>hts[i]=phaseH((phases[i].tasks||[]).length));
  // 上位目標＝ゴール箱のさらに上に積む段（大枠＝vision／中目標＝midGoal）。未設定の段は描かない
  const hasVision=!!(d.vision&&String(d.vision).trim());
  const hasMid=!!(d.midGoal&&String(d.midGoal).trim());
  const VIS_BAND=46, VIS_GAP=22, VIS_H=hasVision?(VIS_BAND+VIS_GAP):0;
  const MID_BAND=44, MID_GAP=20, MID_H=hasMid?(MID_BAND+MID_GAP):0;
  const TOP_H=VIS_H+MID_H;
  const H=HEADER_H+TOP_H+GOAL_H+GAP+order.reduce((s,i)=>s+hts[i]+GAP,0)+PAD;
  const cx=PHASE_X+PHASE_W/2;
  const o=[];
  o.push(`<svg xmlns="http://www.w3.org/2000/svg" id="gm" viewBox="0 0 ${W} ${H}" font-family="${FONT}" width="${W}" height="${H}">`);
  o.push(SVG_DEFS);
  o.push(`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>`);
  let head=esc(d.name||"")+(d.note?`（${esc(d.note)}）`:"")+`｜${esc(d.theme||"")}`;
  o.push(`<text x="20" y="34" font-size="19" font-weight="700" fill="${COL.ink}">${head}</text>`);
  if(hasVision||hasMid){ // ヘッダーにも上位目標を1行常時表示（今のゴールが霞んでも見える）
    const vt=(hasVision?"大枠："+String(d.vision):"中目標："+String(d.midGoal));
    const vs=vt.length>22?vt.slice(0,22)+"…":vt;
    o.push(`<text x="20" y="52" font-size="11" fill="${COL.sub}">${esc(vs)}</text>`);
  }
  const bx=W-210, bw=150;
  o.push(`<text x="${W-20}" y="26" text-anchor="end" font-size="13" fill="${COL.sub}">達成率</text>`);
  o.push(`<text x="${bx-8}" y="50" text-anchor="end" font-size="20" font-weight="700" fill="${COL.done}">${rate}%</text>`);
  o.push(`<rect x="${bx}" y="38" width="${bw}" height="12" rx="6" fill="${COL.futureBg}"/>`);
  o.push(`<rect x="${bx}" y="38" width="${Math.round(bw*rate/100)}" height="12" rx="6" fill="${COL.done}"/>`);
  const pill=(cy,label,fg,bg)=>{o.push(`<rect x="${PILL_X}" y="${cy-11}" width="${PILL_W}" height="22" rx="11" fill="${bg}" stroke="${fg}"/>`);
    o.push(`<text x="${PILL_X+PILL_W/2}" y="${cy+4}" text-anchor="middle" font-size="11" font-weight="700" fill="${fg}">${esc(label)}</text>`);};
  const arrow=(yb,yt)=>{o.push(`<line x1="${cx}" y1="${yb}" x2="${cx}" y2="${yt+6}" stroke="${COL.future}" stroke-width="2"/>`);
    o.push(`<path d="M${cx-5},${yt+8} L${cx},${yt+2} L${cx+5},${yt+8} Z" fill="${COL.future}"/>`);};
  // 上位目標の段（大枠＝紫破線・中目標＝青破線）を上から積み、淡い上向き矢印で連結
  const gy=HEADER_H+TOP_H;
  const tierBand=(y,h,fill,stroke,starFill,label,body,bodyFill)=>{
    o.push(`<rect x="${PHASE_X}" y="${y}" width="${PHASE_W}" height="${h}" rx="10" fill="${fill}" stroke="${stroke}" stroke-width="1.6" stroke-dasharray="5 4"/>`);
    o.push(star(PHASE_X+PHASE_W-16, y+14, 6, starFill));
    o.push(`<text x="${PHASE_X+12}" y="${y+17}" font-size="10.5" font-weight="700" fill="${stroke}">${esc(label)}</text>`);
    wrap(body,17).slice(0,2).forEach((l,k)=>o.push(`<text x="${PHASE_X+12}" y="${y+34+k*14}" font-size="12" font-weight="600" fill="${bodyFill}">${esc(l)}</text>`));
  };
  const upArrow=(yUpperBottom,yLowerTop,color,label)=>{ // 下段上端→上段下端への上向き矢印
    o.push(`<line x1="${cx}" y1="${yLowerTop}" x2="${cx}" y2="${yUpperBottom+5}" stroke="${color}" stroke-width="2" stroke-dasharray="4 3"/>`);
    o.push(`<path d="M${cx-5},${yUpperBottom+7} L${cx},${yUpperBottom+1} L${cx+5},${yUpperBottom+7} Z" fill="${color}"/>`);
    if(label)o.push(`<text x="${cx+9}" y="${yUpperBottom+16}" font-size="9.5" fill="${color}">${label}</text>`);
  };
  if(hasVision) tierBand(HEADER_H, VIS_BAND, "#F3F0FF", "#8A7FD0", "#C9BEF2",
    "大枠ゴール（長期・北極星）"+(d.visionDue?`・${d.visionDue}`:""), d.vision, "#4B3FA0");
  if(hasMid) tierBand(HEADER_H+VIS_H, MID_BAND, "#EEF6FF", "#5C90CE", "#B9D6F2",
    "中目標（中期のマイルストーン）"+(d.midDue?`・${d.midDue}`:""), d.midGoal, "#2C5A93");
  if(hasMid) upArrow(HEADER_H+VIS_H+MID_BAND, gy, "#5C90CE", "その先へ");        // 今期→中目標
  if(hasVision&&hasMid) upArrow(HEADER_H+VIS_BAND, HEADER_H+VIS_H, "#8A7FD0", ""); // 中目標→大枠
  if(hasVision&&!hasMid) upArrow(HEADER_H+VIS_BAND, gy, "#8A7FD0", "その先へ");    // 今期→大枠（中目標なし）
  o.push(`<rect x="${PHASE_X}" y="${gy}" width="${PHASE_W}" height="${GOAL_H}" rx="10" fill="url(#goalGrad)" stroke="#FFD36E" stroke-width="2.5"/>`);
  o.push(`<rect x="${PHASE_X}" y="${gy}" width="${PHASE_W}" height="${GOAL_H/2}" rx="10" fill="#ffffff" opacity="0.16"/>`);
  o.push(`<text x="${PHASE_X+14}" y="${gy+22}" font-size="12" font-weight="700" fill="#fff">ゴール</text>`);
  o.push(star(PHASE_X+PHASE_W-16, gy+15, 6, "#FFF1B8"));
  wrap(d.goal,13).slice(0,2).forEach((l,k)=>o.push(`<text x="${PHASE_X+14}" y="${gy+42+k*16}" font-size="13" font-weight="600" fill="#fff">${esc(l)}</text>`));
  pill(gy+GOAL_H/2,"達成","#B7791F","#FFF3D6");
  // ── 成長キャラ（達成感メーター：1タスク=餌、1フェーズ完食=進化）──
  const g=growth(d);
  const ccx=402, ccy=112+TOP_H, cs=1.7, tx=ccx+46;
  o.push(birdMarkup(g.form,ccx,ccy,cs,g.phaseDone,g.cycle>=2?g.cycle:0));
  if(g.form<5){
    o.push(`<text x="${tx}" y="${ccy-3}" font-size="13" font-weight="700" fill="${COL.ink}">あと${g.need}コで進化</text>`);
    o.push(`<text x="${tx}" y="${ccy+15}" font-size="11" fill="${COL.sub}">餌 ${g.phaseDone}/${g.phaseTotal}　累計 ${g.allDone}/${g.all}</text>`);
  }else{
    o.push(`<text x="${tx}" y="${ccy+2}" font-size="13" font-weight="700" fill="#C2410C">覚醒！全タスク完了</text>`);
  }
  // 周回（何羽目の不死鳥まで来たか）— 2周目以降 or 不死鳥で表示
  if(g.cycle>=2 || g.earned>0){
    o.push(`<text x="${tx}" y="${ccy+33}" font-size="11" font-weight="700" fill="#B7791F">${g.cycle}周目${g.earned>0?`・達成 ${g.earned}羽`:""}</text>`);
  }
  o.push(`<text x="${PILL_X}" y="62" font-size="10" fill="${COL.sub}">目標時期</text>`);
  const todayIso=todayISO(); let overdueAny=false;
  let y=gy+GOAL_H+GAP; arrow(y,gy+GOAL_H);
  order.forEach(idx=>{
    const p=phases[idx], h=hts[idx], sn=idx+1, tasks=p.tasks||[];
    let st,fg,bg;
    if(sn<cur){st="done";fg=COL.done;bg=COL.doneBg;}
    else if(sn===cur){st="now";fg=COL.now;bg=COL.nowBg;}
    else{st="future";fg=COL.future;bg=COL.futureBg;}
    // 目標時期ピル（終了日から固定。未完了かつ期限超過＝遅れは赤）
    const complete=tasks.length>0 && tasks.every(t=>t.done);
    const due=p.due; let pl,pf,pb;
    if(sn<cur||complete){pl="クリア";pf=COL.done;pb=COL.doneBg;}
    else if(due && due<todayIso){pl="⚠"+weekLabelDate(due);pf="#DC2626";pb="#FEE2E2";overdueAny=true;}
    else{pl=due?weekLabelDate(due):"—";pf=(st==="now")?COL.now:COL.future;pb=(st==="now")?COL.nowBg:COL.futureBg;}
    const sw=st==="now"?2:1;
    o.push(`<rect x="${PHASE_X}" y="${y}" width="${PHASE_W}" height="${h}" rx="10" fill="${bg}" stroke="${fg}" stroke-width="${sw}"/>`);
    const mcy=y+20;
    o.push(`<circle cx="${PHASE_X-12}" cy="${mcy}" r="9" fill="${fg}"/>`);
    if(st==="done")o.push(`<path d="M${PHASE_X-16},${mcy} l3,3 l6,-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`);
    o.push(`<text x="${PHASE_X+12}" y="${y+22}" font-size="14" font-weight="700" fill="${COL.ink}">${esc(STAGE_NAMES[idx])}</text>`);
    wrap("完了："+(p.doneDef||""),15).slice(0,2).forEach((l,k)=>o.push(`<text x="${PHASE_X+12}" y="${y+40+k*15}" font-size="11" fill="${COL.sub}">${esc(l)}</text>`));
    pill(y+h/2,pl,pf,pb);
    tasks.forEach((t,j)=>{const ty=y+16+j*LH, dn=!!t.done, bc=dn?COL.done:COL.future;
      o.push(`<rect x="${TASK_X}" y="${ty-11}" width="14" height="14" rx="3" fill="${dn?COL.done:"#fff"}" stroke="${bc}" stroke-width="1.5"/>`);
      if(dn)o.push(`<path d="M${TASK_X+3},${ty-4} l3,3 l5,-6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`);
      o.push(`<text x="${TASK_X+22}" y="${ty}" font-size="12.5" fill="${dn?COL.sub:COL.ink}"${dn?' text-decoration="line-through"':''}>${esc(t.name)}</text>`);});
    const yn=y+h+GAP; if(idx!==0)arrow(yn,y+h); y=yn;
  });
  if(overdueAny){
    // タイトル(y34)・達成率バー(右)と重ならないようヘッダー下段中央(y44〜66)に配置
    o.push(`<rect x="196" y="44" width="176" height="22" rx="11" fill="#DC2626"/>`);
    o.push(`<text x="284" y="59" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">⚠ 期限に遅れあり</text>`);
  }
  o.push("</svg>");
  return o.join("\n");
}

// ───────── エディタ描画 ─────────
function renderEditor(){
  const e=document.getElementById("editor");
  const stageBtns=[1,2,3,4,5].map(s=>`<button data-stage="${s}" class="${data.currentStage==s?'on':''}">${STAGE_NAMES[s-1]}</button>`).join("");
  let html=`
    <div class="field"><label>名前</label><input type="text" data-f="name" value="${esc(data.name)}"></div>
    <div class="field"><label>所属</label><input type="text" data-f="note" value="${esc(data.note)}"></div>
    <div class="field"><label>テーマ（分野の見出し・任意）</label><input type="text" data-f="theme" value="${esc(data.theme)}"></div>
    <div class="field"><label>ゴール（観察できる状態・今期の到達点）</label><input type="text" data-f="goal" value="${esc(data.goal)}"></div>
    <div class="field"><label>🌟 大枠ゴール（長期・北極星／半年〜1年後の到達像。今のタスクが何のための一歩か）</label><input type="text" data-f="vision" value="${esc(data.vision||'')}" placeholder="例：どんな客層でも自分の型で安定して契約でき、後輩に型を教えられる"></div>
    <div class="field"><label>大枠の時期ラベル（任意・例「半年後（2026年内）」）</label><input type="text" data-f="visionDue" value="${esc(data.visionDue||'')}" placeholder="半年後（2026年内）"></div>
    <div class="field"><label>🏔 中目標（中期のマイルストーン・今期ゴールと大枠の間の一里塚）</label><input type="text" data-f="midGoal" value="${esc(data.midGoal||'')}" placeholder="例：苦手客層でも型どおり切り返せるようになる"></div>
    <div class="field"><label>中目標の時期ラベル（任意・例「2〜3ヶ月後」）</label><input type="text" data-f="midDue" value="${esc(data.midDue||'')}" placeholder="2〜3ヶ月後"></div>
    <div class="field"><label>現在ステージ（今ここ）</label><div class="stage-pick">${stageBtns}</div></div>
    <div class="field"><label>周回（何周目／達成した不死鳥の番号）</label>
      <div class="cycle-row">
        <input type="number" min="1" step="1" data-f-cycle value="${Math.max(1,Math.floor(+data.cycle||1))}" style="width:72px">
        <span class="hint" style="margin:0">アバターに番号が付き、何羽目か一目で分かる</span>
        <button class="nextgoal" data-nextgoal>🎉 ゴール達成 → 次のゴールへ</button>
      </div>
    </div>
    <p class="hint">週次MTの編集：①できたタスクに<b>チェック</b> ②遅れたら<b>期限を延期</b>（日付を変更／「＋1週」で以降もまとめてずらす・赤=超過） ③タスク内容は<b>その場で書き換え・追加・×削除</b> ④ステージが進んだら上のボタンで変更。終了時に「JSON保存」。</p>`;
  // フェーズは図解と同じ並び（⑤→①）
  const tIso=todayISO();
  [4,3,2,1,0].forEach(idx=>{
    const p=data.phases[idx]; const isNow=data.currentStage==idx+1;
    const badgeC = isNow?COL.now:(idx+1<data.currentStage?COL.done:COL.future);
    const complete=(p.tasks||[]).length>0 && (p.tasks||[]).every(t=>t.done);
    const late = p.due && p.due<tIso && !complete && (idx+1>=data.currentStage);
    const tasks=(p.tasks||[]).map((t,j)=>`
      <div class="task">
        <input type="checkbox" data-task="${idx}:${j}" ${t.done?"checked":""}>
        <input type="text" data-taskname="${idx}:${j}" value="${esc(t.name)}">
        <button class="del" data-deltask="${idx}:${j}" title="削除">×</button>
      </div>`).join("");
    html+=`
      <div class="phase ${isNow?'now':''}${late?' late':''}">
        <div class="phase-head">
          <span class="badge" style="background:${badgeC};color:#fff">${STAGE_NAMES[idx]}</span>
          <input type="text" data-phasename="${idx}" value="${esc(p.name)}" style="flex:1;border:none;font-weight:700;font-size:13px">
          <input type="date" data-due="${idx}" value="${esc(p.due||'')}" class="duein${late?' late':''}" title="このフェーズの期限（延期はここで変更）">
          <button class="dueplus" data-dueplus="${idx}" title="このフェーズ以降の期限をまとめて1週うしろへ">＋1週</button>
        </div>
        ${late?'<div class="lateflag">⚠ 期限超過 → 「＋1週」で以降の期限を延期、または日付を直接変更</div>':''}
        ${tasks}
        <button class="addtask" data-addtask="${idx}">＋ タスクを追加</button>
        <input class="doneDef" data-donedef="${idx}" value="${esc(p.doneDef)}" placeholder="完了の定義（観察できる状態）">
      </div>`;
  });
  e.innerHTML=html;
}

// 🔭 俯瞰（フェードアウト）ビュー：タスクを畳み、大枠▸中目標▸今期ゴールの全体像だけを見せる
function buildOverviewSvg(d){
  const W=680, BX=170, BW=340, cx=BX+BW/2;
  const g=growth(d), cur=+d.currentStage||1;
  const tiers=[];
  if(d.vision&&String(d.vision).trim())
    tiers.push({label:"大枠ゴール（長期・北極星）"+(d.visionDue?`・${d.visionDue}`:""),body:d.vision,fill:"#F3F0FF",stroke:"#8A7FD0",bodyFill:"#4B3FA0",labelFill:"#8A7FD0",dashed:true});
  if(d.midGoal&&String(d.midGoal).trim())
    tiers.push({label:"中目標（中期のマイルストーン）"+(d.midDue?`・${d.midDue}`:""),body:d.midGoal,fill:"#EEF6FF",stroke:"#5C90CE",bodyFill:"#2C5A93",labelFill:"#5C90CE",dashed:true});
  tiers.push({label:"今期ゴール",body:d.goal||"",fill:"url(#goalGrad)",stroke:"#FFD36E",bodyFill:"#fff",labelFill:"#fff",dashed:false});
  const boxes=tiers.map(t=>{const lines=wrap(t.body,24).slice(0,3);return Object.assign({},t,{lines,h:34+lines.length*17});});
  const HEAD=64, ARROW=34, STRIP=96, PAD=24;
  const H=HEAD+boxes.reduce((s,b)=>s+b.h,0)+ARROW*boxes.length+STRIP+PAD;
  const o=[];
  o.push(`<svg xmlns="http://www.w3.org/2000/svg" id="gm" viewBox="0 0 ${W} ${H}" font-family="${FONT}" width="${W}" height="${H}">`);
  o.push(SVG_DEFS);
  o.push(`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>`);
  const head=esc(d.name||"")+(d.note?`（${esc(d.note)}）`:"")+`｜${esc(d.theme||"")}`;
  o.push(`<text x="24" y="32" font-size="18" font-weight="700" fill="${COL.ink}">${head}</text>`);
  o.push(`<text x="24" y="52" font-size="12" fill="${COL.sub}">🔭 俯瞰ビュー：目標の全体像（タスクは畳んで表示）</text>`);
  o.push(`<text x="${W-24}" y="28" text-anchor="end" font-size="14" font-weight="700" fill="${COL.done}">達成率 ${g.rate}%</text>`);
  o.push(`<rect x="${W-160}" y="38" width="136" height="9" rx="4.5" fill="${COL.futureBg}"/>`);
  o.push(`<rect x="${W-160}" y="38" width="${Math.round(136*g.rate/100)}" height="9" rx="4.5" fill="${COL.done}"/>`);
  o.push(birdMarkup(g.form,W-52,HEAD+8,1.15,g.phaseDone,g.cycle>=2?g.cycle:0));
  let y=HEAD;
  boxes.forEach((b,i)=>{
    if(i>0){const ay=y-ARROW;
      o.push(`<line x1="${cx}" y1="${y-6}" x2="${cx}" y2="${ay+9}" stroke="${b.stroke}" stroke-width="2.5"${b.dashed?' stroke-dasharray="5 4"':''}/>`);
      o.push(`<path d="M${cx-6},${ay+12} L${cx},${ay+3} L${cx+6},${ay+12} Z" fill="${b.stroke}"/>`);
      o.push(`<text x="${cx+11}" y="${ay+14}" font-size="10" fill="${b.stroke}">その先へ</text>`);}
    o.push(`<rect x="${BX}" y="${y}" width="${BW}" height="${b.h}" rx="12" fill="${b.fill}" stroke="${b.stroke}" stroke-width="2"${b.dashed?' stroke-dasharray="6 4"':''}/>`);
    if(String(b.fill).indexOf("goalGrad")>=0){o.push(`<rect x="${BX}" y="${y}" width="${BW}" height="${b.h/2}" rx="12" fill="#fff" opacity="0.16"/>`);o.push(star(BX+BW-18,y+16,7,"#FFF1B8"));}
    o.push(`<text x="${BX+16}" y="${y+20}" font-size="11" font-weight="700" fill="${b.labelFill}">${esc(b.label)}</text>`);
    b.lines.forEach((l,k)=>o.push(`<text x="${BX+16}" y="${y+40+k*17}" font-size="14" font-weight="600" fill="${b.bodyFill}">${esc(l)}</text>`));
    y+=b.h+ARROW;
  });
  // 今のタスク群→今期ゴールの矢印＋フェーズ帯（タスクは畳む＝淡色でフェードアウト）
  const ay=y-ARROW;
  o.push(`<line x1="${cx}" y1="${y+2}" x2="${cx}" y2="${ay+9}" stroke="${COL.future}" stroke-width="2.5"/>`);
  o.push(`<path d="M${cx-6},${ay+12} L${cx},${ay+3} L${cx+6},${ay+12} Z" fill="${COL.future}"/>`);
  o.push(`<text x="${BX}" y="${y+8}" font-size="12" font-weight="700" fill="${COL.now}">今ここ：${esc(STAGE_NAMES[cur-1])}（この下のタスクは畳み中）</text>`);
  const cw=(BW)/5, chipY=y+18;

// 今週の最優先タスク：現在ステージ以降で最初の未完タスク
function topTask(d){
  const cur=+d.currentStage||1;
  for(let s=cur-1;s<(d.phases||[]).length;s++){
    const t=(d.phases[s].tasks||[]).find(x=>!x.done); if(t)return{task:t.name,stage:s};
  }
  for(let s=0;s<(d.phases||[]).length;s++){
    const t=(d.phases[s].tasks||[]).find(x=>!x.done); if(t)return{task:t.name,stage:s};
  }
  return {task:"全タスク完了！次のゴールへ",stage:cur-1};
}

// スマホ1画面まとめ表示（週次スクショ共有用）：ゴール・アバター・現在地・最優先・全タスクを1枚に凝縮
function buildSummarySvg(d){
  const W=430, PAD=12, taskH=16;     // LINE可読性のため横幅を広げ文字を一回り大きく
  const g=growth(d), cur=+d.currentStage||1, tt=topTask(d), todayIso=todayISO();
  const blocks=(d.phases||[]).map((p,idx)=>{const tasks=p.tasks||[];return{idx,p,tasks,h:22+Math.max(1,tasks.length)*taskH+6};});
  const topLines=[];
  if(d.vision&&String(d.vision).trim())topLines.push({t:"大枠："+String(d.vision),c:"#6357CC"});
  if(d.midGoal&&String(d.midGoal).trim())topLines.push({t:"中目標："+String(d.midGoal),c:"#2C5A93"});
  const visH=topLines.length?topLines.length*14+6:0;
  const gy=48+visH, gw=270, gh=64;
  const py=gy+gh+12, stripH=46;      // 最優先ストリップ
  const headH=py+stripH+10;
  const H=headH+blocks.reduce((s,b)=>s+b.h+6,0)+PAD;
  const o=[];
  o.push(`<svg xmlns="http://www.w3.org/2000/svg" id="gm" viewBox="0 0 ${W} ${H}" font-family="${FONT}" width="${W}" height="${H}">`);
  o.push(SVG_DEFS);
  o.push(`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>`);
  // 名前・テーマ／達成率・バー
  o.push(`<text x="${PAD}" y="22" font-size="16" font-weight="700" fill="${COL.ink}">${esc(d.name||"")}${d.note?`（${esc(d.note)}）`:""}</text>`);
  o.push(`<text x="${PAD}" y="40" font-size="11.5" fill="${COL.sub}">${esc(d.theme||"")}</text>`);
  topLines.forEach((ln,i)=>{ // 上位目標（大枠／中目標）を先頭に最大2行（今のゴールの“その先”）
    const vs=ln.t.length>34?ln.t.slice(0,34)+"…":ln.t;
    o.push(`<text x="${PAD}" y="${54+i*14}" font-size="11" font-weight="700" fill="${ln.c}">${esc(vs)}</text>`);
  });
  o.push(`<text x="${W-PAD}" y="22" text-anchor="end" font-size="17" font-weight="700" fill="${COL.done}">達成率 ${g.rate}%</text>`);
  o.push(`<rect x="${W-150}" y="30" width="138" height="8" rx="4" fill="${COL.futureBg}"/>`);
  o.push(`<rect x="${W-150}" y="30" width="${Math.round(138*g.rate/100)}" height="8" rx="4" fill="${COL.done}"/>`);
  // ゴール箱
  o.push(`<rect x="${PAD}" y="${gy}" width="${gw}" height="${gh}" rx="10" fill="url(#goalGrad)" stroke="#FFD36E" stroke-width="2"/>`);
  o.push(`<rect x="${PAD}" y="${gy}" width="${gw}" height="${gh/2}" rx="10" fill="#fff" opacity="0.16"/>`);
  o.push(`<text x="${PAD+12}" y="${gy+20}" font-size="12" font-weight="700" fill="#fff">ゴール</text>`);
  o.push(star(PAD+gw-15, gy+14, 6, "#FFF1B8"));
  wrap(d.goal,18).slice(0,2).forEach((l,k)=>o.push(`<text x="${PAD+12}" y="${gy+40+k*17}" font-size="14" font-weight="600" fill="#fff">${esc(l)}</text>`));
  // アバター（小）＋キャプション
  const acx=Math.round((PAD+gw+(W-PAD))/2), acy=gy+32;
  o.push(birdMarkup(g.form,acx,acy,1.3,g.phaseDone,g.cycle>=2?g.cycle:0));
  o.push(`<text x="${acx}" y="${gy+gh+2}" text-anchor="middle" font-size="11" font-weight="700" fill="#B7791F">${g.form<5?`あと${g.need}コ`:"覚醒"}${g.cycle>=2?`・${g.cycle}周目`:""}</text>`);
  // 今週の最優先ストリップ
  o.push(`<rect x="${PAD}" y="${py}" width="${W-2*PAD}" height="${stripH}" rx="10" fill="${COL.nowBg}" stroke="${COL.now}"/>`);
  o.push(`<text x="${PAD+12}" y="${py+17}" font-size="12" font-weight="700" fill="${COL.now}">🎯 今週の最優先（今ここ：${esc(STAGE_NAMES[tt.stage])}）</text>`);
  o.push(`<text x="${PAD+12}" y="${py+37}" font-size="15" font-weight="700" fill="${COL.ink}">${esc(wrap(tt.task,30)[0])}</text>`);
  // ステージ（①→⑤・全タスク）
  let y=headH;
  blocks.forEach(b=>{
    const sn=b.idx+1, isNow=sn===cur;
    let st,fg;
    if(sn<cur){st="done";fg=COL.done;} else if(isNow){st="now";fg=COL.now;} else{st="future";fg=COL.future;}
    if(isNow)o.push(`<rect x="6" y="${y-2}" width="${W-12}" height="${b.h}" rx="9" fill="${COL.nowBg}" opacity="0.5"/>`);
    o.push(`<circle cx="${PAD+6}" cy="${y+11}" r="5.5" fill="${fg}"/>`);
    o.push(`<text x="${PAD+18}" y="${y+15}" font-size="13" font-weight="700" fill="${COL.ink}">${esc(STAGE_NAMES[b.idx])}</text>`);
    const complete=b.tasks.length>0&&b.tasks.every(t=>t.done);
    const due=b.p.due; let pl,pf,pb;
    if(sn<cur||complete){pl="クリア";pf=COL.done;pb=COL.doneBg;}
    else if(due&&due<todayIso){pl="⚠"+weekLabelDate(due);pf="#DC2626";pb="#FEE2E2";}
    else{pl=due?weekLabelDate(due):"—";pf=(st==="now")?COL.now:COL.future;pb=(st==="now")?COL.nowBg:COL.futureBg;}
    o.push(`<rect x="${W-100}" y="${y+2}" width="88" height="19" rx="9.5" fill="${pb}" stroke="${pf}"/>`);
    o.push(`<text x="${W-56}" y="${y+15}" text-anchor="middle" font-size="11" font-weight="700" fill="${pf}">${esc(pl)}</text>`);
    let ty=y+34;

      const dn=!!t.done;

      if(dn)o.push(`<path d="M${PAD+21},${ty-3.5} l2.4,2.4 l4.6,-6" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`);
      o.push(`<text x="${PAD+36}" y="${ty}" font-size="12" fill="${dn?COL.sub:COL.ink}"${dn?' text-decoration="line-through"':""}>${esc(wrap(t.name,30)[0])}</text>`);
      ty+=taskH;
    });
    y+=b.h+6;
  });
  o.push("</svg>");
  return o.join("\n");
}

// 録音（MediaRecorder・オフライン）。停止で .webm/.mp4 をダウンロード（localStorageには保存しない）
let mediaRec=null,recChunks=[],recTimer=null,recStart=0;
function setRecUI(on){const b=document.getElementById("recBtn");if(b){b.textContent=on?"■ 録音停止":"● 録音開始";b.classList.toggle("on",on);}}
async function toggleRec(){
  if(mediaRec&&mediaRec.state==="recording"){mediaRec.stop();return;}
  if(!(navigator.mediaDevices&&window.MediaRecorder)){alert("このブラウザは録音に対応していません");return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks=[];mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=e=>{if(e.data&&e.data.size)recChunks.push(e.data);};
    mediaRec.onstop=()=>{
      clearInterval(recTimer);
      const blob=new Blob(recChunks,{type:(mediaRec&&mediaRec.mimeType)||"audio/webm"});
      const ext=blob.type.indexOf("mp4")>=0?"mp4":"webm";
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${data.name}_${todayISO()}_MT.${ext}`;a.click();
      stream.getTracks().forEach(t=>t.stop());
      setRecUI(false);const rt=document.getElementById("recTime");if(rt)rt.textContent="音声を保存しました ✓";
    };
    mediaRec.start();recStart=Date.now();setRecUI(true);
    recTimer=setInterval(()=>{const s=Math.floor((Date.now()-recStart)/1000);const rt=document.getElementById("recTime");if(rt)rt.textContent=`● 録音中 ${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;},500);
  }catch(e){alert("録音を開始できませんでした（マイク許可が必要）: "+e);}
}

function downloadJSON(obj,filename){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
function downloadSvgPng(xml,w,h,scale,filename){
  const img=new Image();
  img.onload=()=>{const c=document.createElement("canvas");c.width=w*scale;c.height=h*scale;
    const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);
    ctx.scale(scale,scale);ctx.drawImage(img,0,0);
    const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=filename;a.click();};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);
}

  downloadJSON(d, base+".json");
  const xml=buildSvg(d), m=xml.match(/width="(\d+)" height="(\d+)"/);
  downloadSvgPng(xml, +m[1], +m[2], 2, base+".png");
  return base;
}

    persist();renderEditor();}
  else if(t.dataset.nextgoal!=null){
    if(confirm("現在のゴールを達成として、次のゴールに進みます。\n\nまず【この周回の地図(PNG)とデータ(JSON)を書き出し】てから:\n・周回数を+1（アバターに番号が付き、何羽目か分かる）\n・全タスクのチェックを外す（卵に戻る）\n・ステージを①に戻す\n\n書き出した2ファイルは tools/goalmap/out/archive/ に保存してコミットすると、過去の達成地図をいつでも見返せます。\nゴール文・テーマ・タスクは、このあと新しいゴールに手動で書き換えてください。")){
      const base=archiveCycle(data); // ★リセット前にこの周回をアーカイブ書き出し
      data.cycle=Math.max(1,Math.floor(+data.cycle||1))+1;
      data.currentStage=1;
      (data.phases||[]).forEach(p=>(p.tasks||[]).forEach(x=>{x.done=false;if("status" in x)x.status="未着手";}));
      persist();renderEditor();
      flash(`${base} を書き出しました → out/archive/ に保存 ✓`);
    }
  }
});
// 🎙 MTログ / 議事録（#mtlog は再描画で中身だけ入れ替わる。コンテナに一度だけ委譲）
(function(){
  const mt=document.getElementById("mtlog");
  mt.addEventListener("toggle",e=>{if(e.target&&e.target.tagName==="DETAILS")mtOpen=e.target.open;},true);
  mt.addEventListener("input",ev=>{const t=ev.target;
    if(t.id==="logDate")mtDraft.date=t.value;
    else if(t.id==="logText")mtDraft.text=t.value;
    else if(t.id==="logNext")mtDraft.next=t.value;});
  mt.addEventListener("click",ev=>{const t=ev.target;
    if(t.id==="recBtn"){toggleRec();return;}
    if(t.id==="logSave"){saveLog();return;}
    if(t.id==="logMd"){const dr=readDraft();const e={date:dr.date,text:dr.text,next:dr.nextRaw.split(/\n+/).map(s=>s.trim()).filter(Boolean)};downloadMd(logToMd(e),mdFilename(e.date));flash("議事録Markdownを書き出しました ✓");return;}
    if(t.id==="draftToTasks"){const idx=(+document.getElementById("taskPhase").value||1)-1;const raw=(document.getElementById("logNext")||{}).value||"";const n=addTasksToPhase(raw.split(/\n+/),idx);if(n)flash(`${n}件を ${STAGE_NAMES[idx]} に追加 ✓`);else alert("次アクションを入力してください");return;}
    if(t.dataset.logmd!=null){const e=data.logs[+t.dataset.logmd];if(e)downloadMd(logToMd(e),mdFilename(e.date||todayISO()));return;}
    if(t.dataset.dellog!=null){const i=+t.dataset.dellog;if(confirm("この議事録を削除しますか？")){data.logs.splice(i,1);persist();renderMtlog();}return;}
    if(t.dataset.logtask!=null){const[i,j]=t.dataset.logtask.split(":").map(Number);const idx=(+document.getElementById("taskPhase").value||1)-1;const name=(data.logs[i].next||[])[j];if(name&&addTasksToPhase([name],idx))flash(`「${name}」を ${STAGE_NAMES[idx]} に追加 ✓`);return;}});
})();
document.getElementById("member").addEventListener("change",ev=>{leaveViewing();const n=ev.target.value;const d=load(n)||findEmbedded(n);if(d){data=d;save(data);renderAll();}});
document.getElementById("roster").addEventListener("click",ev=>{
  const t=ev.target.closest("[data-rmember]"); if(!t)return;
  leaveViewing();
  const n=t.dataset.rmember; const d=load(n)||findEmbedded(n);
  if(d){data=d;save(data);renderAll();}});
// 履歴を見る（読み取り専用・上書きしない）
document.getElementById("history").addEventListener("click",()=>document.getElementById("historyFile").click());
document.getElementById("historyFile").addEventListener("change",ev=>{
  const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{enterHistory(JSON.parse(r.result),f.name);}catch(e){alert("JSONの読み込みに失敗: "+e);}};
  r.readAsText(f); ev.target.value="";});   // 同じファイルを再選択できるようにリセット
document.addEventListener("click",ev=>{ if(ev.target.id==="historyClose"||ev.target.id==="historyClose2")exitHistory(); });
document.getElementById("reset").addEventListener("click",()=>{
  if(viewing){exitHistory();return;}   // 履歴表示中は初期化せず、現在地に戻すだけ
  const base=findEmbedded(data.name);
  if(!base){alert("このメンバーは内蔵の初期値がありません（手元のJSONから読み込んでください）");return;}
  if(!confirm(`「${data.name}」を内蔵の初期値に戻します。今の編集内容は消えます。よろしいですか？`))return;
  data=base;save(data);renderAll();});
document.getElementById("new").addEventListener("click",()=>{leaveViewing();const n=prompt("メンバー名は？");if(!n)return;data=template(n);save(data);renderAll();});
document.getElementById("import").addEventListener("change",ev=>{
  const f=ev.target.files[0];if(!f)return;leaveViewing();const r=new FileReader();
  r.onload=()=>{try{data=JSON.parse(r.result);save(data);renderAll();}catch(e){alert("JSONの読み込みに失敗: "+e);}};r.readAsText(f);});
document.getElementById("exportJson").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=data.name+".json";a.click();});
document.getElementById("print").addEventListener("click",()=>window.print());
document.getElementById("summary").addEventListener("click",()=>{
  summaryMode=!summaryMode;
  if(summaryMode)overviewMode=false;
  document.getElementById("summary").classList.toggle("primary",summaryMode);
  document.getElementById("overview").classList.toggle("primary",false);
  document.body.classList.toggle("summary",summaryMode);   // ロスターを隠してスッキリ
  renderCanvas();
  if(summaryMode)document.getElementById("canvas").scrollIntoView({behavior:"smooth",block:"start"});
});
document.getElementById("overview").addEventListener("click",()=>{
  overviewMode=!overviewMode;
  if(overviewMode){summaryMode=false;document.body.classList.remove("summary");}
  document.getElementById("overview").classList.toggle("primary",overviewMode);
  document.getElementById("summary").classList.toggle("primary",false);
  renderCanvas();
  document.getElementById("canvas").scrollIntoView({behavior:"smooth",block:"start"});
});
document.getElementById("exportAvatar").addEventListener("click",()=>{
  const xml=buildAvatarCard(data);
  const m=xml.match(/width="(\d+)" height="(\d+)"/);
  const img=new Image();
  img.onload=()=>{const s=3,c=document.createElement("canvas");
    c.width=(+m[1])*s;c.height=(+m[2])*s;const ctx=c.getContext("2d");
    ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);ctx.scale(s,s);ctx.drawImage(img,0,0);
    const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=data.name+"_アバター.png";a.click();};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);});
document.getElementById("exportPng").addEventListener("click",()=>{
  const svg=document.getElementById("gm");
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  img.onload=()=>{const s=3,c=document.createElement("canvas");   // 高解像度（LINE圧縮対策）
    c.width=svg.viewBox.baseVal.width*s;c.height=svg.viewBox.baseVal.height*s;
    const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);
    ctx.scale(s,s);ctx.drawImage(img,0,0);
    const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=data.name+".png";a.click();};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);});

// ───────── 起動 ─────────
(function init(){
  // 内蔵メンバーで、まだlocalStorageに無いものを初期投入（既存の編集は上書きしない）
  EMBEDDED.forEach(m=>{ if(!load(m.name)) localStorage.setItem(KEY(m.name),JSON.stringify(m)); });
  const members=listMembers();
  data=load(members[0])||clone(EMBEDDED[0]);
  renderAll();
})();
</script>
