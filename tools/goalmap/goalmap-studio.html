<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ゴールマップ・スタジオ — 週次MTG用</title>
<!--
  週次MTGで使う、開くだけのインタラクティブ図解エディタ。
  左で編集（チェック／ステージ／ゴール）→ 右の図解と達成率が即更新。
  保存はブラウザ(localStorage)＋JSON書き出し。図解はPNG/印刷で出力。
  図解仕様は ../../ゴールマップ運用.md / tools/goalmap/generate_goalmap.py と同一。
-->
<style>
  :root{
    --done:#1D9E75; --done-bg:#E7F5EF;
    --now:#EF9F27;  --now-bg:#FDF3E2;
    --future:#9AA3AD; --future-bg:#F2F4F6;
    --goal:#6357CC; --goal-bg:#EEECFA;
    --ink:#1F2933; --sub:#67707A; --line:#E3E7EB;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Sans","Noto Sans CJK JP","Yu Gothic",sans-serif;
    color:var(--ink);background:#F7F8FA}
  header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fff;
    border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;flex-wrap:wrap}
  header h1{font-size:15px;margin:0 12px 0 0}
  select,button,input{font-family:inherit;font-size:13px}
  button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer}
  button:hover{background:#F2F4F6}
  button.primary{background:var(--goal);color:#fff;border-color:var(--goal)}
  .wrap{display:grid;grid-template-columns:420px 1fr;gap:0;align-items:start}
  .editor{padding:16px;border-right:1px solid var(--line);height:calc(100vh - 52px);overflow:auto}
  .canvas{padding:20px;height:calc(100vh - 52px);overflow:auto;background:#fff}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--sub);margin-bottom:3px}
  .field input[type=text]{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px}
  .stage-pick{display:flex;gap:4px;flex-wrap:wrap}
  .stage-pick button{padding:5px 8px}
  .stage-pick button.on{background:var(--now);color:#fff;border-color:var(--now)}
  .phase{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px;background:#fff}
  .phase.now{border-color:var(--now);box-shadow:0 0 0 1px var(--now)}
  .phase-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .phase-head .badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
  .task{display:flex;align-items:center;gap:6px;margin:4px 0}
  .task input[type=text]{flex:1;padding:4px 6px;border:1px solid var(--line);border-radius:6px}
  .task input[type=checkbox]{width:16px;height:16px;accent-color:var(--done)}
  .task .del{border:none;background:none;color:var(--sub);cursor:pointer;font-size:15px;padding:2px 4px}
  .addtask{font-size:12px;color:var(--goal);background:none;border:none;cursor:pointer;padding:2px}
  .doneDef{width:100%;padding:4px 6px;border:1px dashed var(--line);border-radius:6px;font-size:12px;margin-top:4px}
  .hint{font-size:11px;color:var(--sub);margin:2px 0 12px}
  svg{max-width:100%;height:auto;border:1px solid var(--line);border-radius:8px}
  .roster{display:flex;gap:8px;overflow-x:auto;padding:8px 14px;background:#fff;border-bottom:1px solid var(--line)}
  .rtile{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:1px;border:1px solid var(--line);border-radius:10px;padding:4px 8px 5px;background:#fff;cursor:pointer;min-width:62px}
  .rtile:hover{background:#F7F8FA}
  .rtile.on{border-color:var(--goal);box-shadow:0 0 0 1px var(--goal);background:#FAF9FF}
  .rtile svg{width:44px;height:44px;display:block}
  .rtile .rname{font-size:11px;font-weight:700;color:var(--ink)}
  .rtile .rrate{font-size:10px;color:var(--sub)}
  @media print{header,.editor,.roster{display:none}.wrap{grid-template-columns:1fr}.canvas{height:auto;border:none}svg{border:none}}
</style>
</head>
<body>
<header>
  <h1>🧭 ゴールマップ・スタジオ</h1>
  <label class="hint">メンバー:</label>
  <select id="member"></select>
  <button id="new">＋新規</button>
  <button id="reset" title="このメンバーを内蔵の初期値に戻す">↺ 初期化</button>
  <label class="hint" style="margin-left:8px">読込:</label>
  <input type="file" id="import" accept="application/json" style="font-size:12px;width:170px" />
  <button id="exportJson">JSON保存</button>
  <button id="exportPng" class="primary">PNG出力</button>
  <button id="exportAvatar" title="今のアバターだけを画像で書き出す">アバターPNG</button>
  <button id="print">印刷/PDF</button>
  <span id="saved" class="hint" style="margin-left:auto"></span>
</header>
<div class="roster" id="roster" title="クリックでメンバー切替（今のアバターが見えます）"></div>
<div class="wrap">
  <div class="editor" id="editor"></div>
  <div class="canvas" id="canvas"></div>
</div>

<script>
const STAGE_NAMES = ["①型を知る","②練習","③実践","④振り返り","⑤自走"];
const COL = {done:"#1D9E75",doneBg:"#E7F5EF",now:"#EF9F27",nowBg:"#FDF3E2",
  future:"#9AA3AD",futureBg:"#F2F4F6",goal:"#6357CC",goalBg:"#EEECFA",ink:"#1F2933",sub:"#67707A"};
const FONT = "Hiragino Sans, 'Noto Sans CJK JP', 'Yu Gothic', sans-serif";
const SVG_DEFS = `<defs>`+
  `<linearGradient id="goalGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5B4BE0"/><stop offset="0.5" stop-color="#B14BE0"/><stop offset="1" stop-color="#FFC24B"/></linearGradient>`+
  `<linearGradient id="phx" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFE259"/><stop offset="0.5" stop-color="#FF9A00"/><stop offset="1" stop-color="#FF3D00"/></linearGradient>`+
  `<linearGradient id="phx2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF0A0"/><stop offset="1" stop-color="#FF7A00"/></linearGradient>`+
  `<linearGradient id="hen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#37C9B0"/><stop offset="0.6" stop-color="#3DA0E8"/><stop offset="1" stop-color="#7A5BE0"/></linearGradient>`+
  `<linearGradient id="pcock" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2BD0C0"/><stop offset="0.55" stop-color="#2E8FD0"/><stop offset="1" stop-color="#2E4BB0"/></linearGradient>`+
  `<linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF0A8"/><stop offset="0.5" stop-color="#F2C230"/><stop offset="1" stop-color="#C8901A"/></linearGradient>`+
  `</defs>`;

function template(name){
  return {name:name||"新規メンバー",note:"",theme:"テーマ",goal:"観察できる状態でゴールを書く",
    why:"",currentStage:1,
    phases:[
      {name:"型を知る",doneDef:"観察できる完了の状態",tasks:[]},
      {name:"練習",doneDef:"観察できる完了の状態",tasks:[]},
      {name:"実践",doneDef:"観察できる完了の状態",tasks:[]},
      {name:"振り返り",doneDef:"観察できる完了の状態",tasks:[]},
      {name:"自走",doneDef:"観察できる完了の状態",tasks:[]},
    ]};
}
// ───────── 同梱メンバーデータ（members/*.json のミラー）─────────
// ファイル単体で配布できるよう、実メンバーをここに内蔵する。初回起動時に
// localStorage へ取り込み、ドロップダウンに全員が並ぶ。各人の最新編集は
// localStorage 側が正（ここは初期値／「↺ 初期化」で戻せる工場出荷値）。
const EMBEDDED = [
  {name:"岡野",note:"wanny",theme:"契約を安定させる（クローザー）",
   goal:"客層を問わず自分の型で契約まで運び、成約が安定する",
   why:"成約率が客層で振れる。型を固めて安定させたい",currentStage:2,
   phases:[
     {name:"型を知る",doneDef:"自分の勝ち負けを言語化できる",tasks:[
       {name:"直近の成約・失注を5件ずつ振り返る",done:true},
       {name:"勝ち／負けパターンを言語化する",done:true}]},
     {name:"練習",doneDef:"苦手ケースでも型どおり切り返せる",tasks:[
       {name:"苦手ケースの切り返しをロープレ",done:false},
       {name:"トップ商談の録音を聞く",done:false}]},
     {name:"実践",doneDef:"商談で型を意図的に使えている",tasks:[
       {name:"商談前に型の要点を確認する",done:false},
       {name:"ネック処理を意図的に試す",done:false}]},
     {name:"振り返り",doneDef:"失注の共通要因を抽出し、wany全体に展開できる",tasks:[
       {name:"週次で成約率の推移を確認",done:false},
       {name:"失注の共通要因を抽出する",done:false},
       {name:"wannyメンバーの失注商談を1件レビューし、要因を自分の型と照合",done:false}]},
     {name:"自走",doneDef:"指導なしで型を回し、wanyの標準トークに言語化できる",tasks:[
       {name:"苦手客層を指名で担当する",done:false},
       {name:"自分の型を後輩に共有する",done:false},
       {name:"勝ち型をwannyの標準トークに言語化・共有する",done:false},
       {name:"メンバーのロープレを主催し、教えて詰まった点を自分の再発見に使う",done:false}]},
   ]},
  {name:"宮腰",note:"wanny・戸田指導",theme:"契約を安定させる（クローザー）",
   goal:"客層を問わず自分の型で契約まで運び、成約が安定する",
   why:"自分の成約を安定させつつ、戸田に型を教えられる状態を目指す",currentStage:2,
   phases:[
     {name:"型を知る",doneDef:"自分の勝ち負けを言語化できる",tasks:[
       {name:"直近の成約・失注を5件ずつ振り返る",done:true},
       {name:"勝ち／負けパターンを言語化する",done:true}]},
     {name:"練習",doneDef:"苦手ケースでも型どおり切り返せる",tasks:[
       {name:"苦手ケースの切り返しをロープレ",done:false},
       {name:"トップ商談の録音を聞く",done:false}]},
     {name:"実践",doneDef:"商談で型を意図的に使えている",tasks:[
       {name:"商談前に型の要点を確認する",done:false},
       {name:"ネック処理を意図的に試す",done:false}]},
     {name:"振り返り",doneDef:"失注の共通要因を、戸田に教える前提で言語化できる",tasks:[
       {name:"週次で成約率の推移を確認",done:false},
       {name:"戸田と一緒に失注を振り返り、教える前提で言語化",done:false}]},
     {name:"自走",doneDef:"指導なしで型を回し、戸田に教えられる",tasks:[
       {name:"戸田に自分の型を教える",done:false},
       {name:"戸田の商談に同行してFBする",done:false}]},
   ]},
];
const clone = x => JSON.parse(JSON.stringify(x));
const embeddedNames = () => EMBEDDED.map(m=>m.name);
const findEmbedded = n => { const m=EMBEDDED.find(x=>x.name===n); return m?clone(m):null; };

// ───────── localStorage ─────────
const KEY = n => "goalmap:"+n;
function listMembers(){return Object.keys(localStorage).filter(k=>k.startsWith("goalmap:")).map(k=>k.slice(8)).sort();}
function save(d){localStorage.setItem(KEY(d.name),JSON.stringify(d));flash("保存しました ✓");}
function load(n){const v=localStorage.getItem(KEY(n));return v?JSON.parse(v):null;}
let saveTimer;function flash(msg){document.getElementById("saved").textContent=msg;clearTimeout(saveTimer);saveTimer=setTimeout(()=>document.getElementById("saved").textContent="",1500);}

let data;

// ───────── SVG描画（Python版と同一仕様）─────────
const esc = s => String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const wrap = (t,n) => {t=String(t||"");const r=[];for(let i=0;i<t.length;i+=n)r.push(t.slice(i,i+n));return r.length?r:[""];};
const phaseH = n => Math.max(60, 24 + 18*n);

// ───────── 成長キャラ（鶏→不死鳥）。1タスク=餌1つ、1フェーズ食べ切る=進化 ─────────
const FORM_NAMES=["たまご","ひよこ","小鶏","とさか鶏","極彩鶏","不死鳥"];
function growth(d){
  const per=(d.phases||[]).map(p=>{const t=p.tasks||[];return{done:t.filter(x=>x.done).length,total:t.length};});
  const all=per.reduce((s,p)=>s+p.total,0), allDone=per.reduce((s,p)=>s+p.done,0);
  const rate=all?Math.round(allDone/all*100):0;
  let cleared=0; for(const p of per){ if(p.total>0&&p.done===p.total)cleared++; else break; }
  const form=rate>=100?5:Math.min(cleared,4);
  let np=null; for(const p of per){ if(!(p.total>0&&p.done===p.total)){np=p;break;} }
  if(!np)np=per[per.length-1]||{done:0,total:0};
  return {rate,form,allDone,all,need:Math.max(0,np.total-np.done),phaseDone:np.done,phaseTotal:np.total};
}
function star(cx,cy,r,fill){
  const pts=[[0,-1],[0.24,-0.24],[1,0],[0.24,0.24],[0,1],[-0.24,0.24],[-1,0],[-0.24,-0.24]]
    .map(([x,y])=>`${(cx+x*r).toFixed(1)},${(cy+y*r).toFixed(1)}`).join(" ");
  return `<polygon points="${pts}" fill="${fill}"/>`;
}
function birdMarkup(form,cx,cy,s,phaseDone){
  const X=v=>(cx+v*s).toFixed(1),Y=v=>(cy+v*s).toFixed(1),R=v=>(v*s).toFixed(1);
  const o=[];
  const line=(x1,y1,x2,y2,c,w)=>o.push(`<line x1="${X(x1)}" y1="${Y(y1)}" x2="${X(x2)}" y2="${Y(y2)}" stroke="${c}" stroke-width="${R(w)}" stroke-linecap="round"/>`);
  const circ=(x,y,r,f)=>o.push(`<circle cx="${X(x)}" cy="${Y(y)}" r="${R(r)}" fill="${f}"/>`);
  const ell=(x,y,rx,ry,f)=>o.push(`<ellipse cx="${X(x)}" cy="${Y(y)}" rx="${R(rx)}" ry="${R(ry)}" fill="${f}"/>`);
  const beak=(x,y,w,c)=>o.push(`<polygon points="${X(x)},${Y(y-2.2)} ${X(x+w)},${Y(y)} ${X(x)},${Y(y+2.2)}" fill="${c||'#F2870D'}"/>`);
  const eye=(x,y)=>{circ(x,y,2.1,"#FFFFFF");circ(x+0.3,y,1.2,"#33270D");};
  const comb=(x,y,n,r)=>{for(let i=0;i<n;i++)circ(x+i*r*1.3-((n-1)*r*1.3)/2,y-(i%2?1.6:0),r,"#E0352B");};
  const M=(x,y)=>`M${X(x)},${Y(y)}`,Q=(a,b,x,y)=>`Q${X(a)},${Y(b)} ${X(x)},${Y(y)}`,L=(x,y)=>`L${X(x)},${Y(y)}`;
  const path=(d,f,st,w)=>o.push(`<path d="${d}" fill="${f||'none'}"${st?` stroke="${st}" stroke-width="${R(w||2)}" stroke-linecap="round" stroke-linejoin="round"`:''}/>`);
  if(form===0){
    ell(0,0,15,19,"#FFF3D6");
    o.push(`<ellipse cx="${X(0)}" cy="${Y(0)}" rx="${R(15)}" ry="${R(19)}" fill="none" stroke="#E2D2A0" stroke-width="${R(1.4)}"/>`);
    circ(-5,-3,1.5,"#E6D3A0");circ(5,5,1.3,"#E6D3A0");circ(1,11,1.2,"#E6D3A0");
    if(phaseDone>0)path(M(-6,-7)+L(-2,-3)+L(-6,1)+L(-1,5),null,"#C9B27A",1.6);
  }else if(form===1){
    line(-4,13,-4,19,"#F2A30D",2);line(4,13,4,19,"#F2A30D",2);
    circ(0,2,13,"#FFD23F");ell(-8,3,4.5,7,"#F4C12B");
    circ(0,-9,8,"#FFD23F");beak(7,-9,6);eye(3,-11);
    path(M(-1,-16)+Q(-3,-21,1,-21),null,"#F4C12B",1.6);
  }else if(form===2){
    line(-5,15,-5,21,"#F2A30D",2);line(5,15,5,21,"#F2A30D",2);
    path(M(-13,2)+Q(-21,0,-22,-8),null,"#F4C12B",3);
    ell(0,3,15,14,"#FFE066");ell(-7,4,5.5,9,"#F4C12B");line(-9,0,-5,7,"#E8B23A",1.4);
    circ(2,-9,9,"#FFE066");comb(2,-18,2,2.4);beak(11,-9,6);eye(6,-11);
  }else if(form===3){
    line(-5,17,-5,24,"#E8901F",2.2);line(5,17,5,24,"#E8901F",2.2);
    path(M(-14,2)+Q(-26,-2,-24,-14),null,"#E8B04B",4);
    path(M(-13,5)+Q(-24,4,-26,-6),null,"#C98A2E",3);
    ell(0,4,17,15,"#FBEFD0");ell(-6,5,7,10,"#E8B04B");line(-8,1,-3,9,"#CC9A3D",1.5);
    circ(4,-9,9,"#FBEFD0");comb(4,-19,3,2.6);
    o.push(`<ellipse cx="${X(11)}" cy="${Y(-4)}" rx="${R(1.8)}" ry="${R(3.4)}" fill="#E0352B"/>`);
    beak(12,-8,6);eye(7,-11);
  }else if(form===4){
    line(-5,18,-5,25,"#E8901F",2.4);line(5,18,5,25,"#E8901F",2.4);
    path(M(-14,3)+Q(-30,-3,-27,-18),null,"#37C9B0",4.5);
    path(M(-15,6)+Q(-30,4,-30,-9),null,"#FF8A3D",4);
    path(M(-13,9)+Q(-26,11,-29,1),null,"#FFD23F",3.5);
    ell(0,5,18,16,"url(#hen)");ell(-5,6,7.5,11,"#FF8A3D");line(-7,2,-2,11,"#E0702A",1.6);
    circ(5,-9,10,"url(#hen)");comb(5,-21,3,3);
    o.push(`<ellipse cx="${X(13)}" cy="${Y(-4)}" rx="${R(2)}" ry="${R(3.8)}" fill="#E0352B"/>`);
    beak(13,-8,7);eye(8,-11);
    o.push(star(cx+15*s,cy-16*s,3.4*s,"#FFFFFF"));
  }else{
    // 最終進化：クジャク×黄金のゴージャス版（青緑〜金イリデッセント・特大の羽・目玉の大扇・黄金の装飾）
    const RAYS=[[31,0],[22,22],[0,31],[-22,22],[-31,0],[-22,-22],[0,-31],[22,-22]];
    RAYS.forEach((p,i)=>o.push(`<line x1="${X(0)}" y1="${Y(0)}" x2="${X(p[0])}" y2="${Y(p[1])}" stroke="#F2C230" stroke-width="${R(i%2?1.4:2.4)}" stroke-linecap="round" opacity="0.28"/>`));
    o.push(`<circle cx="${X(0)}" cy="${Y(0)}" r="${R(30)}" fill="#2BD0C0" opacity="0.10"/>`);
    o.push(`<circle cx="${X(0)}" cy="${Y(0)}" r="${R(24)}" fill="none" stroke="#F2C230" stroke-width="${R(1.4)}" opacity="0.45"/>`);
    o.push(`<circle cx="${X(0)}" cy="${Y(0)}" r="${R(20)}" fill="#FFF6D8" opacity="0.14"/>`);
    // 孔雀の大扇（黄金の羽軸＋目玉模様）
    const UF=[[-0.914,-0.407],[-0.695,-0.719],[-0.375,-0.927],[0,-1],[0.375,-0.927],[0.695,-0.719],[0.914,-0.407]];
    const Rf=32, bX=0, bY=6;
    UF.forEach(d2=>{
      const tx=bX+d2[0]*Rf, ty=bY+d2[1]*Rf, mx=bX+d2[0]*Rf*0.55, my=bY+d2[1]*Rf*0.55;
      path(M(bX,bY)+Q(mx,my,tx,ty),null,"#C9A227",2.4);
      circ(tx,ty,6,"#E6B422");circ(tx,ty,4.4,"#C9A227");circ(tx,ty,3.2,"#1FA6A0");circ(tx,ty,1.9,"#173A8C");
      o.push(`<circle cx="${X(tx-0.6)}" cy="${Y(ty-0.6)}" r="${R(0.7)}" fill="#FFFFFF"/>`);
    });
    // 特大の翼（金の縁取り）
    path(M(-3,0)+Q(-22,-6,-35,-16)+Q(-20,-12,-5,-5)+"Z","url(#pcock)");
    path(M(-3,3)+Q(-24,2,-35,-3)+Q(-18,-2,-5,-1)+"Z","#1746A0");
    path(M(-3,0)+Q(-22,-6,-35,-16),null,"#F2C230",1.6);
    path(M(3,0)+Q(22,-6,35,-16)+Q(20,-12,5,-5)+"Z","url(#pcock)");
    path(M(3,3)+Q(24,2,35,-3)+Q(18,-2,5,-1)+"Z","#1746A0");
    path(M(3,0)+Q(22,-6,35,-16),null,"#F2C230",1.6);
    // 胴＋黄金の胸当て
    ell(0,6,12,15,"url(#pcock)");
    o.push(`<ellipse cx="${X(0)}" cy="${Y(9)}" rx="${R(6)}" ry="${R(9.5)}" fill="url(#gold)" opacity="0.95"/>`);
    o.push(`<ellipse cx="${X(-2)}" cy="${Y(5)}" rx="${R(2.4)}" ry="${R(4.5)}" fill="#FFF6D8" opacity="0.55"/>`);
    // 首〜頭（濃紺）
    circ(0,-9,7.5,"#1C4FB0");
    // 黄金の冠
    path(M(-5,-15)+L(-4,-21)+L(-2,-16)+L(0,-22)+L(2,-16)+L(4,-21)+L(5,-15)+"Z","url(#gold)");
    circ(0,-22.5,1.5,"#FFF0A8");
    beak(7,-9,7,"#E8E0C8");eye(3,-11);
    // 輝き
    o.push(star(cx,cy-13*s,2*s,"#FFFFFF"));
    o.push(star(cx-27*s,cy-9*s,2.6*s,"#FFF1B8"));
    o.push(star(cx+28*s,cy-3*s,2.2*s,"#FFF1B8"));
    o.push(star(cx+20*s,cy+15*s,2*s,"#FFE7A0"));
  }
  return o.join("");
}

// 現在のアバターだけを切り出した単体カード（朝礼/Slack/Notionに貼る用）
function buildAvatarCard(d){
  const g=growth(d), W=300, H=228, ink="#1F2933", sub="#67707A";
  const o=[];
  o.push(`<svg xmlns="http://www.w3.org/2000/svg" id="card" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" font-family="${FONT}">`);
  o.push(SVG_DEFS);
  o.push(`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>`);
  o.push(`<rect x="5" y="5" width="${W-10}" height="${H-10}" rx="18" fill="#FFFDF7" stroke="#EFE7D6" stroke-width="1.5"/>`);
  o.push(birdMarkup(g.form, W/2, 84, 2.35, g.phaseDone));
  // 文字の可読性確保の帯（背の高い不死鳥でも名前が読める）
  o.push(`<rect x="14" y="158" width="${W-28}" height="62" rx="12" fill="#FFFDF7" opacity="0.92"/>`);
  o.push(`<text x="${W/2}" y="182" text-anchor="middle" font-size="20" font-weight="700" fill="${ink}">${esc(d.name||"")}</text>`);
  o.push(`<text x="${W/2}" y="202" text-anchor="middle" font-size="15" font-weight="700" fill="${g.form===5?"#C2410C":"#B7791F"}">達成率 ${g.rate}%</text>`);
  const sub2 = g.form<5 ? `あと${g.need}コで進化（餌 ${g.phaseDone}/${g.phaseTotal}）` : `覚醒！全タスク完了`;
  o.push(`<text x="${W/2}" y="217" text-anchor="middle" font-size="11.5" fill="${sub}">${esc(sub2)}</text>`);
  o.push("</svg>");
  return o.join("\n");
}

function buildSvg(d){
  const W=680, PHASE_X=130, PHASE_W=210, PILL_X=20, PILL_W=58, TASK_X=360,
        HEADER_H=70, GAP=26, GOAL_H=70, PAD=28, LH=18;
  const phases=d.phases, cur=+d.currentStage||1;
  const all=phases.flatMap(p=>p.tasks||[]); const done=all.filter(t=>t.done).length;
  const total=all.length, rate=total?Math.round(done/total*100):0;
  const order=[4,3,2,1,0];
  const hts={}; order.forEach(i=>hts[i]=phaseH((phases[i].tasks||[]).length));
  const H=HEADER_H+GOAL_H+GAP+order.reduce((s,i)=>s+hts[i]+GAP,0)+PAD;
  const cx=PHASE_X+PHASE_W/2;
  const o=[];
  o.push(`<svg xmlns="http://www.w3.org/2000/svg" id="gm" viewBox="0 0 ${W} ${H}" font-family="${FONT}" width="${W}" height="${H}">`);
  o.push(SVG_DEFS);
  o.push(`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>`);
  let head=esc(d.name||"")+(d.note?`（${esc(d.note)}）`:"")+`｜${esc(d.theme||"")}`;
  o.push(`<text x="20" y="34" font-size="19" font-weight="700" fill="${COL.ink}">${head}</text>`);
  const bx=W-210, bw=150;
  o.push(`<text x="${W-20}" y="26" text-anchor="end" font-size="13" fill="${COL.sub}">達成率</text>`);
  o.push(`<text x="${bx-8}" y="50" text-anchor="end" font-size="20" font-weight="700" fill="${COL.done}">${rate}%</text>`);
  o.push(`<rect x="${bx}" y="38" width="${bw}" height="12" rx="6" fill="${COL.futureBg}"/>`);
  o.push(`<rect x="${bx}" y="38" width="${Math.round(bw*rate/100)}" height="12" rx="6" fill="${COL.done}"/>`);
  const pill=(cy,label,fg,bg)=>{o.push(`<rect x="${PILL_X}" y="${cy-11}" width="${PILL_W}" height="22" rx="11" fill="${bg}" stroke="${fg}"/>`);
    o.push(`<text x="${PILL_X+PILL_W/2}" y="${cy+4}" text-anchor="middle" font-size="11" font-weight="700" fill="${fg}">${esc(label)}</text>`);};
  const arrow=(yb,yt)=>{o.push(`<line x1="${cx}" y1="${yb}" x2="${cx}" y2="${yt+6}" stroke="${COL.future}" stroke-width="2"/>`);
    o.push(`<path d="M${cx-5},${yt+8} L${cx},${yt+2} L${cx+5},${yt+8} Z" fill="${COL.future}"/>`);};
  // ゴール箱（輝くグラデーション＝到達点を一目で“ごほうび”に見せる）
  const gy=HEADER_H;
  o.push(`<rect x="${PHASE_X}" y="${gy}" width="${PHASE_W}" height="${GOAL_H}" rx="10" fill="url(#goalGrad)" stroke="#FFD36E" stroke-width="2.5"/>`);
  o.push(`<rect x="${PHASE_X}" y="${gy}" width="${PHASE_W}" height="${GOAL_H/2}" rx="10" fill="#ffffff" opacity="0.16"/>`);
  o.push(`<text x="${PHASE_X+14}" y="${gy+22}" font-size="12" font-weight="700" fill="#fff">ゴール</text>`);
  o.push(star(PHASE_X+PHASE_W-16, gy+15, 6, "#FFF1B8"));
  wrap(d.goal,13).slice(0,2).forEach((l,k)=>o.push(`<text x="${PHASE_X+14}" y="${gy+42+k*16}" font-size="13" font-weight="600" fill="#fff">${esc(l)}</text>`));
  pill(gy+GOAL_H/2,"達成","#B7791F","#FFF3D6");
  // ── 成長キャラ（達成感メーター：1タスク=餌、1フェーズ完食=進化）──
  const g=growth(d);
  const ccx=402, ccy=112, cs=1.7, tx=ccx+46;
  o.push(birdMarkup(g.form,ccx,ccy,cs,g.phaseDone));
  if(g.form<5){
    o.push(`<text x="${tx}" y="${ccy-3}" font-size="13" font-weight="700" fill="${COL.ink}">あと${g.need}コで進化</text>`);
    o.push(`<text x="${tx}" y="${ccy+15}" font-size="11" fill="${COL.sub}">餌 ${g.phaseDone}/${g.phaseTotal}　累計 ${g.allDone}/${g.all}</text>`);
  }else{
    o.push(`<text x="${tx}" y="${ccy+2}" font-size="13" font-weight="700" fill="#C2410C">覚醒！全タスク完了</text>`);
  }
  let y=gy+GOAL_H+GAP; arrow(y,gy+GOAL_H); let weeks=0;
  order.forEach(idx=>{
    const p=phases[idx], h=hts[idx], sn=idx+1, tasks=p.tasks||[];
    let st,fg,bg,pl;
    if(sn<cur){st="done";fg=COL.done;bg=COL.doneBg;pl="クリア";}
    else if(sn===cur){st="now";fg=COL.now;bg=COL.nowBg;pl="今";}
    else{weeks++;st="future";fg=COL.future;bg=COL.futureBg;pl="＋"+weeks+"週";}
    const sw=st==="now"?2:1;
    o.push(`<rect x="${PHASE_X}" y="${y}" width="${PHASE_W}" height="${h}" rx="10" fill="${bg}" stroke="${fg}" stroke-width="${sw}"/>`);
    const mcy=y+20;
    o.push(`<circle cx="${PHASE_X-12}" cy="${mcy}" r="9" fill="${fg}"/>`);
    if(st==="done")o.push(`<path d="M${PHASE_X-16},${mcy} l3,3 l6,-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`);
    o.push(`<text x="${PHASE_X+12}" y="${y+22}" font-size="14" font-weight="700" fill="${COL.ink}">${esc(STAGE_NAMES[idx])}</text>`);
    wrap("完了："+(p.doneDef||""),15).slice(0,2).forEach((l,k)=>o.push(`<text x="${PHASE_X+12}" y="${y+40+k*15}" font-size="11" fill="${COL.sub}">${esc(l)}</text>`));
    pill(y+h/2,pl,fg,bg);
    tasks.forEach((t,j)=>{const ty=y+16+j*LH, dn=!!t.done, bc=dn?COL.done:COL.future;
      o.push(`<rect x="${TASK_X}" y="${ty-11}" width="14" height="14" rx="3" fill="${dn?COL.done:"#fff"}" stroke="${bc}" stroke-width="1.5"/>`);
      if(dn)o.push(`<path d="M${TASK_X+3},${ty-4} l3,3 l5,-6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`);
      o.push(`<text x="${TASK_X+22}" y="${ty}" font-size="12.5" fill="${dn?COL.sub:COL.ink}"${dn?' text-decoration="line-through"':''}>${esc(t.name)}</text>`);});
    const yn=y+h+GAP; if(idx!==0)arrow(yn,y+h); y=yn;
  });
  o.push("</svg>");
  return o.join("\n");
}

// ───────── エディタ描画 ─────────
function renderEditor(){
  const e=document.getElementById("editor");
  const stageBtns=[1,2,3,4,5].map(s=>`<button data-stage="${s}" class="${data.currentStage==s?'on':''}">${STAGE_NAMES[s-1]}</button>`).join("");
  let html=`
    <div class="field"><label>名前</label><input type="text" data-f="name" value="${esc(data.name)}"></div>
    <div class="field"><label>所属</label><input type="text" data-f="note" value="${esc(data.note)}"></div>
    <div class="field"><label>テーマ（分野の見出し・任意）</label><input type="text" data-f="theme" value="${esc(data.theme)}"></div>
    <div class="field"><label>ゴール（観察できる状態・今期の到達点）</label><input type="text" data-f="goal" value="${esc(data.goal)}"></div>
    <div class="field"><label>現在ステージ（今ここ）</label><div class="stage-pick">${stageBtns}</div></div>
    <p class="hint">MT中：できたタスクにチェック → 図解と達成率が即更新。終われば翌週の図解が完成。</p>`;
  // フェーズは図解と同じ並び（⑤→①）
  [4,3,2,1,0].forEach(idx=>{
    const p=data.phases[idx]; const isNow=data.currentStage==idx+1;
    const badgeC = isNow?COL.now:(idx+1<data.currentStage?COL.done:COL.future);
    const tasks=(p.tasks||[]).map((t,j)=>`
      <div class="task">
        <input type="checkbox" data-task="${idx}:${j}" ${t.done?"checked":""}>
        <input type="text" data-taskname="${idx}:${j}" value="${esc(t.name)}">
        <button class="del" data-deltask="${idx}:${j}" title="削除">×</button>
      </div>`).join("");
    html+=`
      <div class="phase ${isNow?'now':''}">
        <div class="phase-head">
          <span class="badge" style="background:${badgeC};color:#fff">${STAGE_NAMES[idx]}</span>
          <input type="text" data-phasename="${idx}" value="${esc(p.name)}" style="flex:1;border:none;font-weight:700;font-size:13px">
        </div>
        ${tasks}
        <button class="addtask" data-addtask="${idx}">＋ タスクを追加</button>
        <input class="doneDef" data-donedef="${idx}" value="${esc(p.doneDef)}" placeholder="完了の定義（観察できる状態）">
      </div>`;
  });
  e.innerHTML=html;
}

function renderCanvas(){document.getElementById("canvas").innerHTML=buildSvg(data);}
function miniAvatar(d){
  const g=growth(d), S=66;
  return `<svg viewBox="0 0 ${S} ${S}" width="${S}" height="${S}">${SVG_DEFS}${birdMarkup(g.form,S/2,S/2+5,1.15,g.phaseDone)}</svg>`;
}
function renderRoster(){
  const el=document.getElementById("roster");
  const names=[...new Set([...listMembers(),...embeddedNames(),data.name])].filter(Boolean).sort();
  el.innerHTML=names.map(n=>{
    const d=load(n)||findEmbedded(n); if(!d)return"";
    const g=growth(d);
    return `<button class="rtile${n===data.name?' on':''}" data-rmember="${esc(n)}">`+
      miniAvatar(d)+`<span class="rname">${esc(n)}</span><span class="rrate">${g.rate}%</span></button>`;
  }).join("");
}
function refreshMemberSelect(){
  const sel=document.getElementById("member");
  // localStorage のメンバー ∪ 内蔵メンバー（重複除去・五十音順）
  const members=[...new Set([...listMembers(),...embeddedNames(),data.name])].filter(Boolean).sort();
  sel.innerHTML=members.map(m=>`<option ${m===data.name?"selected":""}>${esc(m)}</option>`).join("");
}
function renderAll(){renderEditor();renderCanvas();refreshMemberSelect();renderRoster();}
function persist(){save(data);renderCanvas();renderRoster();}

// ───────── イベント ─────────
document.getElementById("editor").addEventListener("input",ev=>{
  const t=ev.target;
  if(t.dataset.f){data[t.dataset.f]=t.value;}
  else if(t.dataset.phasename!=null){data.phases[+t.dataset.phasename].name=t.value;}
  else if(t.dataset.donedef!=null){data.phases[+t.dataset.donedef].doneDef=t.value;}
  else if(t.dataset.taskname){const[i,j]=t.dataset.taskname.split(":").map(Number);data.phases[i].tasks[j].name=t.value;}
  else if(t.dataset.task){const[i,j]=t.dataset.task.split(":").map(Number);data.phases[i].tasks[j].done=t.checked;}
  else return;
  persist();
  if(t.dataset.task)renderEditor(); // チェックで取り消し線等を反映
});
document.getElementById("editor").addEventListener("click",ev=>{
  const t=ev.target;
  if(t.dataset.stage){data.currentStage=+t.dataset.stage;persist();renderEditor();}
  else if(t.dataset.addtask!=null){data.phases[+t.dataset.addtask].tasks.push({name:"新しいタスク",done:false});persist();renderEditor();}
  else if(t.dataset.deltask){const[i,j]=t.dataset.deltask.split(":").map(Number);data.phases[i].tasks.splice(j,1);persist();renderEditor();}
});
document.getElementById("member").addEventListener("change",ev=>{const n=ev.target.value;const d=load(n)||findEmbedded(n);if(d){data=d;save(data);renderAll();}});
document.getElementById("roster").addEventListener("click",ev=>{
  const t=ev.target.closest("[data-rmember]"); if(!t)return;
  const n=t.dataset.rmember; const d=load(n)||findEmbedded(n);
  if(d){data=d;save(data);renderAll();}});
document.getElementById("reset").addEventListener("click",()=>{
  const base=findEmbedded(data.name);
  if(!base){alert("このメンバーは内蔵の初期値がありません（手元のJSONから読み込んでください）");return;}
  if(!confirm(`「${data.name}」を内蔵の初期値に戻します。今の編集内容は消えます。よろしいですか？`))return;
  data=base;save(data);renderAll();});
document.getElementById("new").addEventListener("click",()=>{const n=prompt("メンバー名は？");if(!n)return;data=template(n);save(data);renderAll();});
document.getElementById("import").addEventListener("change",ev=>{
  const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{data=JSON.parse(r.result);save(data);renderAll();}catch(e){alert("JSONの読み込みに失敗: "+e);}};r.readAsText(f);});
document.getElementById("exportJson").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=data.name+".json";a.click();});
document.getElementById("print").addEventListener("click",()=>window.print());
document.getElementById("exportAvatar").addEventListener("click",()=>{
  const xml=buildAvatarCard(data);
  const m=xml.match(/width="(\d+)" height="(\d+)"/);
  const img=new Image();
  img.onload=()=>{const s=3,c=document.createElement("canvas");
    c.width=(+m[1])*s;c.height=(+m[2])*s;const ctx=c.getContext("2d");
    ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);ctx.scale(s,s);ctx.drawImage(img,0,0);
    const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=data.name+"_アバター.png";a.click();};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);});
document.getElementById("exportPng").addEventListener("click",()=>{
  const svg=document.getElementById("gm");
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  img.onload=()=>{const s=2,c=document.createElement("canvas");
    c.width=svg.viewBox.baseVal.width*s;c.height=svg.viewBox.baseVal.height*s;
    const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);
    ctx.scale(s,s);ctx.drawImage(img,0,0);
    const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=data.name+".png";a.click();};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);});

// ───────── 起動 ─────────
(function init(){
  // 内蔵メンバーで、まだlocalStorageに無いものを初期投入（既存の編集は上書きしない）
  EMBEDDED.forEach(m=>{ if(!load(m.name)) localStorage.setItem(KEY(m.name),JSON.stringify(m)); });
  const members=listMembers();
  data=load(members[0])||clone(EMBEDDED[0]);
  renderAll();
})();
</script>
