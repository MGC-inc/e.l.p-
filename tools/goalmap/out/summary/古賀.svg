" fill="#1F2933">週次で自分の商談を振り返る</text><rect x="30" y="452" width="13" height="13" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.4"/><text x="48" y="462" font-size="12" fill="#1F2933">つまずきポイントを先輩と確認する</text><circle cx="18" cy="489" r="5.5" fill="#9AA3AD"/><text x="30" y="493" font-size="13" font-weight="700" fill="#1F2933">⑤自走</text><rect x="330" y="480" width="88" height="19" rx="9.5" fill="#F2F4F6" stroke="#9AA3AD"/><text x="374" y="493" text-anchor="middle" font-size="11" font-weight="700" fill="#9AA3AD">8月第5週</text><rect x="30" y="502" width="13" height="13" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.4"/><text x="48" y="512" font-size="12" fill="#1F2933">指導なしで1商談を最後まで担当する</text><rect x="30" y="518" width="13" height="13" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.4"/><text x="48" y="528" font-size="12" fill="#1F2933">自分の改善テーマを1つ決める</text></svg>