<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 678" font-family="Hiragino Sans, 'Noto Sans CJK JP', 'Yu Gothic', sans-serif" width="680" height="678">
<rect x="0" y="0" width="680" height="678" fill="#FFFFFF"/>
<text x="20" y="34" font-size="19" font-weight="700" fill="#1F2933">宮腰（wanny・戸田指導）｜契約を安定させる（クローザー）</text>
<text x="660" y="26" text-anchor="end" font-size="13" fill="#67707A">達成率</text>
<text x="462" y="50" text-anchor="end" font-size="20" font-weight="700" fill="#1D9E75">15%</text>
<rect x="470" y="38" width="150" height="12" rx="6" fill="#F2F4F6"/>
<rect x="470" y="38" width="22" height="12" rx="6" fill="#1D9E75"/>
<rect x="130" y="70" width="210" height="70" rx="10" fill="#EEECFA" stroke="#6357CC" stroke-width="2"/>
<text x="144" y="92" font-size="12" font-weight="700" fill="#6357CC">ゴール</text>
<text x="144" y="112" font-size="13" fill="#1F2933">客層を問わず自分の型で契約</text>
<text x="144" y="128" font-size="13" fill="#1F2933">まで運び、成約が安定する</text>
<rect x="20" y="94.0" width="58" height="22" rx="11" fill="#EEECFA" stroke="#6357CC" stroke-width="1"/>
<text x="49.0" y="109.0" text-anchor="middle" font-size="11" font-weight="700" fill="#6357CC">達成</text>
<line x1="235.0" y1="166" x2="235.0" y2="146" stroke="#9AA3AD" stroke-width="2"/>
<path d="M230.0,148 L235.0,142 L240.0,148 Z" fill="#9AA3AD"/>
<rect x="130" y="166" width="210" height="96" rx="10" fill="#F2F4F6" stroke="#9AA3AD" stroke-width="1"/>
<circle cx="118" cy="186" r="9" fill="#9AA3AD"/>
<text x="142" y="188" font-size="14" font-weight="700" fill="#1F2933">⑤自走</text>
<text x="142" y="206" font-size="11" fill="#67707A">完了：指導なしで型を回し、戸田</text>
<text x="142" y="221" font-size="11" fill="#67707A">に教えられる</text>
<rect x="20" y="203.0" width="58" height="22" rx="11" fill="#F2F4F6" stroke="#9AA3AD" stroke-width="1"/>
<text x="49.0" y="218.0" text-anchor="middle" font-size="11" font-weight="700" fill="#9AA3AD">＋1週</text>
<rect x="360" y="171" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="182" font-size="12.5" fill="#1F2933">苦手客層を指名で担当する</text>
<rect x="360" y="189" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="200" font-size="12.5" fill="#1F2933">自分の型を後輩に共有する</text>
<rect x="360" y="207" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="218" font-size="12.5" fill="#1F2933">戸田に自分の型を教える</text>
<rect x="360" y="225" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="236" font-size="12.5" fill="#1F2933">戸田の商談に同行してFBする</text>
<line x1="235.0" y1="288" x2="235.0" y2="268" stroke="#9AA3AD" stroke-width="2"/>
<path d="M230.0,270 L235.0,264 L240.0,270 Z" fill="#9AA3AD"/>
<rect x="130" y="288" width="210" height="78" rx="10" fill="#F2F4F6" stroke="#9AA3AD" stroke-width="1"/>
<circle cx="118" cy="308" r="9" fill="#9AA3AD"/>
<text x="142" y="310" font-size="14" font-weight="700" fill="#1F2933">④振り返り</text>
<text x="142" y="328" font-size="11" fill="#67707A">完了：失注の共通要因を、戸田に</text>
<text x="142" y="343" font-size="11" fill="#67707A">教える前提で言語化できる</text>
<rect x="20" y="316.0" width="58" height="22" rx="11" fill="#F2F4F6" stroke="#9AA3AD" stroke-width="1"/>
<text x="49.0" y="331.0" text-anchor="middle" font-size="11" font-weight="700" fill="#9AA3AD">＋2週</text>
<rect x="360" y="293" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="304" font-size="12.5" fill="#1F2933">週次で成約率の推移を確認</text>
<rect x="360" y="311" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="322" font-size="12.5" fill="#1F2933">失注の共通要因を抽出する</text>
<rect x="360" y="329" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="340" font-size="12.5" fill="#1F2933">戸田と一緒に失注を振り返り、教える前提で言語化</text>
<line x1="235.0" y1="392" x2="235.0" y2="372" stroke="#9AA3AD" stroke-width="2"/>
<path d="M230.0,374 L235.0,368 L240.0,374 Z" fill="#9AA3AD"/>
<rect x="130" y="392" width="210" height="60" rx="10" fill="#F2F4F6" stroke="#9AA3AD" stroke-width="1"/>
<circle cx="118" cy="412" r="9" fill="#9AA3AD"/>
<text x="142" y="414" font-size="14" font-weight="700" fill="#1F2933">③実践</text>
<text x="142" y="432" font-size="11" fill="#67707A">完了：商談で型を意図的に使えて</text>
<text x="142" y="447" font-size="11" fill="#67707A">いる</text>
<rect x="20" y="411.0" width="58" height="22" rx="11" fill="#F2F4F6" stroke="#9AA3AD" stroke-width="1"/>
<text x="49.0" y="426.0" text-anchor="middle" font-size="11" font-weight="700" fill="#9AA3AD">＋3週</text>
<rect x="360" y="397" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="408" font-size="12.5" fill="#1F2933">商談前に型の要点を確認する</text>
<rect x="360" y="415" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="426" font-size="12.5" fill="#1F2933">ネック処理を意図的に試す</text>
<line x1="235.0" y1="478" x2="235.0" y2="458" stroke="#9AA3AD" stroke-width="2"/>
<path d="M230.0,460 L235.0,454 L240.0,460 Z" fill="#9AA3AD"/>
<rect x="130" y="478" width="210" height="60" rx="10" fill="#FDF3E2" stroke="#EF9F27" stroke-width="2"/>
<circle cx="118" cy="498" r="9" fill="#EF9F27"/>
<text x="142" y="500" font-size="14" font-weight="700" fill="#1F2933">②練習</text>
<text x="142" y="518" font-size="11" fill="#67707A">完了：苦手ケースでも型どおり切</text>
<text x="142" y="533" font-size="11" fill="#67707A">り返せる</text>
<rect x="20" y="497.0" width="58" height="22" rx="11" fill="#FDF3E2" stroke="#EF9F27" stroke-width="1"/>
<text x="49.0" y="512.0" text-anchor="middle" font-size="11" font-weight="700" fill="#EF9F27">今</text>
<rect x="360" y="483" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="494" font-size="12.5" fill="#1F2933">苦手ケースの切り返しをロープレ</text>
<rect x="360" y="501" width="14" height="14" rx="3" fill="#fff" stroke="#9AA3AD" stroke-width="1.5"/>
<text x="382" y="512" font-size="12.5" fill="#1F2933">トップ商談の録音を聞く</text>
<line x1="235.0" y1="564" x2="235.0" y2="544" stroke="#9AA3AD" stroke-width="2"/>
<path d="M230.0,546 L235.0,540 L240.0,546 Z" fill="#9AA3AD"/>
<rect x="130" y="564" width="210" height="60" rx="10" fill="#E7F5EF" stroke="#1D9E75" stroke-width="1"/>
<circle cx="118" cy="584" r="9" fill="#1D9E75"/>
<path d="M114,584 l3,3 l6,-7" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="142" y="586" font-size="14" font-weight="700" fill="#1F2933">①型を知る</text>
<text x="142" y="604" font-size="11" fill="#67707A">完了：自分の勝ち負けを言語化で</text>
<text x="142" y="619" font-size="11" fill="#67707A">きる</text>
<rect x="20" y="583.0" width="58" height="22" rx="11" fill="#E7F5EF" stroke="#1D9E75" stroke-width="1"/>
<text x="49.0" y="598.0" text-anchor="middle" font-size="11" font-weight="700" fill="#1D9E75">クリア</text>
<rect x="360" y="569" width="14" height="14" rx="3" fill="#1D9E75" stroke="#1D9E75" stroke-width="1.5"/>
<path d="M363,576 l3,3 l5,-6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="382" y="580" font-size="12.5" fill="#67707A" text-decoration="line-through">直近の成約・失注を5件ずつ振り返る</text>
<rect x="360" y="587" width="14" height="14" rx="3" fill="#1D9E75" stroke="#1D9E75" stroke-width="1.5"/>
<path d="M363,594 l3,3 l5,-6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="382" y="598" font-size="12.5" fill="#67707A" text-decoration="line-through">勝ち／負けパターンを言語化する</text>
</svg>