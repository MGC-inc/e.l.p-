<text x="330" y="162" text-anchor="end" font-size="9.5" fill="#5C90CE">2〜3ヶ月後</text>
<text x="142" y="178" font-size="12" font-weight="600" fill="#2C5A93">各メンバーの現在地を把握し、週次で全</text>
<text x="142" y="193" font-size="12" font-weight="600" fill="#2C5A93">員のフォーカスを握れている</text>
