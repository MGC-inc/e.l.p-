<text x="142" y="86" font-size="10.5" font-weight="700" fill="#8A7FD0">大枠ゴール（長期）</text>
<text x="330" y="86" text-anchor="end" font-size="9.5" fill="#8A7FD0">1年後（2027年）</text>
<text x="142" y="102" font-size="12" font-weight="600" fill="#4B3FA0">個人の勢い頼みを脱し、育成と型の仕組</text>
<text x="142" y="117" font-size="12" font-weight="600" fill="#4B3FA0">みでチームが自走して成約し続ける</text>
